<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#050505">
    <title>装备实验室 | 戴维的梦想世界</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=Noto+Sans+SC:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --bg-base: #050505; --text-primary: #FFFFFF; --text-dimmed: #888888; --gold: #D4AF37; --border: rgba(255,255,255,0.05); --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);}
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg-base); color: var(--text-primary); font-family: 'Noto Sans SC', sans-serif; -webkit-font-smoothing: antialiased; display: flex; flex-direction: column; min-height: 100vh;}

        nav { display: flex; justify-content: space-between; align-items: center; padding: 30px 6vw; font-size: 0.95rem; font-weight: 500; letter-spacing: 1px; border-bottom: 1px solid var(--border); background: rgba(5,5,5,0.8); backdrop-filter: blur(20px); z-index: 100;}
        .nav-brand a { color: var(--text-primary); text-decoration: none; font-weight: 700; font-size: 1.2rem; letter-spacing: 2px; transition: color 0.3s ease;}
        .nav-brand a:hover { color: var(--gold); } 
        .nav-links { display: flex; gap: 50px; align-items: center; }
        .nav-links a { color: var(--text-dimmed); text-decoration: none; position: relative; padding-bottom: 6px; transition: color 0.3s ease; letter-spacing: 1px; white-space: nowrap;}
        .nav-links a:hover, .nav-links a.active { color: var(--text-primary); }
        .nav-links a.active::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 2px; background-color: var(--text-primary); }
        
        .mobile-menu-btn { display: none; background: transparent; border: none; color: #fff; font-size: 1.8rem; cursor: pointer; z-index: 101; position: relative; width: 40px; height: 40px; }
        .mobile-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(5,5,5,0.98); backdrop-filter: blur(15px); z-index: 99; display: flex; flex-direction: column; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: var(--transition); }
        .mobile-overlay.active { opacity: 1; visibility: visible; }
        .mobile-overlay a { color: #fff; text-decoration: none; font-size: 2rem; font-weight: 700; letter-spacing: 4px; margin: 20px 0; opacity: 0; transform: translateY(20px); transition: var(--transition); }
        .mobile-overlay.active a { opacity: 1; transform: translateY(0); }
        .mobile-overlay a.active { color: var(--gold); }

        .breadcrumb-nav { padding: 30px 6vw; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border); font-family: 'Inter', sans-serif; font-size: 0.8rem; letter-spacing: 1px;}
        .crumb-link { color: var(--text-dimmed); text-decoration: none; transition: color 0.3s; text-transform: uppercase;}
        .crumb-link:hover { color: var(--gold); }
        .crumb-separator { color: #444; font-size: 0.8rem;}
        .crumb-current { color: var(--text-primary); text-transform: uppercase;}

        .coming-soon-wrapper { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 60px 20px;}
        .cs-tag { color: var(--gold); font-family: 'JetBrains Mono', monospace; letter-spacing: 4px; font-size: 0.8rem; margin-bottom: 20px;}
        .cs-title { font-size: clamp(2.5rem, 5vw, 4rem); font-weight: 900; margin-bottom: 20px; line-height: 1.2; text-transform: uppercase; letter-spacing: -1px;}
        .cs-desc { color: #888; max-width: 500px; line-height: 1.8; font-size: 1.1rem;}
        .radar-ping { width: 60px; height: 60px; border-radius: 50%; border: 1px solid rgba(212,175,55,0.5); margin-bottom: 40px; position: relative; animation: ping 2s infinite ease-out;}
        @keyframes ping { 0% { transform: scale(0.5); opacity: 1; } 100% { transform: scale(2.5); opacity: 0; } }

        .site-footer { border-top: 1px solid var(--border); padding: 40px 0; text-align: center; font-family: 'Inter'; font-size: 0.8rem; color: var(--text-dimmed); letter-spacing: 2px; margin-top: auto;}

        @media (max-width: 768px) {
            nav { padding: 20px 5vw; border-bottom: none; background: var(--bg-base);}
            .nav-links { display: none; }
            .mobile-menu-btn { display: block; }
            .nav-brand a { font-size: 1.1rem; }
            .breadcrumb-nav { padding: 20px 5vw; font-size: 0.75rem;}
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-brand"><a href="index.html">戴维的梦想世界</a></div>
        <div class="nav-links">
            <a href="index.html">首页</a>
            <a href="stories.html">旅行故事</a>
            <a href="guides.html">攻略指南</a>
            <a href="toolkit.html">干货库</a>
            <a href="gear.html" class="active">装备库</a>
            <a href="consult.html">私人定制</a>
        </div>
        <button class="mobile-menu-btn" id="menuToggle">☰</button>
    </nav>
    
    <div class="mobile-overlay" id="mobileOverlay">
        <a href="index.html">首页</a>
        <a href="stories.html">旅行故事</a>
        <a href="guides.html">攻略指南</a>
        <a href="toolkit.html">干货库</a>
        <a href="gear.html" class="active">装备库</a>
        <a href="consult.html">私人定制</a>
    </div>

    <div class="breadcrumb-nav">
        <a href="index.html" class="crumb-link">首页</a><span class="crumb-separator">/</span>
        <span class="crumb-current">装备库</span>
    </div>

    <div class="coming-soon-wrapper">
        <div class="radar-ping"></div>
        <div class="cs-tag">GEAR LAB // 装备实验室</div>
        <h1 class="cs-title">硬核补给线<br>系统接入中</h1>
        <p class="cs-desc">从抵抗 10 级大风的碳纤维脚架，到深入极地的生存衣物系统。我正在整理每一次远征中经受住考验的核心装备库。即将开放访问权限。</p>
    </div>

    <footer class="site-footer">© 2026 戴维的梦想世界.</footer>

    <script>
        const menuToggle = document.getElementById('menuToggle');
        const mobileOverlay = document.getElementById('mobileOverlay');
        let isMenuOpen = false;
        menuToggle.addEventListener('click', () => {
            isMenuOpen = !isMenuOpen;
            if(isMenuOpen) { mobileOverlay.classList.add('active'); menuToggle.innerText = '✕'; document.body.style.overflow = 'hidden';
            } else { mobileOverlay.classList.remove('active'); menuToggle.innerText = '☰'; document.body.style.overflow = 'auto'; }
        });
    </script>
</body>
</html>
