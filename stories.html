<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    
    <title>旅行故事专栏 | DAVID EXPEDITION</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Noto+Sans+SC:wght@300;500;700&display=swap" rel="stylesheet">
    
    <script>document.write('<script src="data.js?v=' + new Date().getTime() + '"><\/script>');</script>
    
    <style>
        :root {
            --bg-base: #050505; --text-primary: #FFFFFF; --text-dimmed: #888888;
            --gold: #D4AF37; --radius: 8px; --transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg-base); color: var(--text-primary); font-family: 'Noto Sans SC', sans-serif; -webkit-font-smoothing: antialiased; overflow-x: hidden;}

        /* 面包屑导航 (统一样式) */
        .breadcrumb-nav { padding: 30px 6vw; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); font-family: 'Inter', sans-serif; font-size: 0.8rem; letter-spacing: 1px; white-space: nowrap; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none;}
        .breadcrumb-nav::-webkit-scrollbar { display: none; }
        .crumb-link { color: var(--text-dimmed); text-decoration: none; transition: color 0.3s; text-transform: uppercase; flex-shrink: 0;}
        .crumb-link:hover { color: var(--gold); }
        .crumb-separator { color: #444; font-size: 0.8rem; flex-shrink: 0;}
        .crumb-current { color: var(--text-primary); font-family: 'Noto Sans SC', sans-serif; flex-shrink: 0;}

        .container { max-width: 1600px; margin: 0 auto; padding: 60px 6vw; min-height: 80vh; }
        .page-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 60px; gap: 40px; flex-wrap: wrap;}
        .title-area h1 { font-size: 3.5rem; font-weight: 700; letter-spacing: -1px; margin-bottom: 10px; margin-top: 0;}
        .title-area p { color: var(--text-dimmed); font-size: 1.1rem; margin: 0;}

        .search-wrapper { position: relative; width: 100%; max-width: 400px; }
        #storySearch { width: 100%; background: transparent; border: none; border-bottom: 2px solid rgba(255,255,255,0.1); padding: 12px 0; color: #fff; font-size: 1.1rem; outline: none; transition: border-color 0.3s; font-family: 'Noto Sans SC', sans-serif;}
        #storySearch:focus { border-color: var(--gold); }
        .search-wrapper::after { content: 'SEARCH'; position: absolute; right: 0; top: 15px; font-size: 0.7rem; color: var(--text-dimmed); letter-spacing: 2px; font-family: 'Inter'; }

        .story-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 40px; }

        .story-card { position: relative; border-radius: var(--radius); overflow: hidden; aspect-ratio: 16 / 9; background: #111; cursor: pointer; border: 1px solid rgba(255,255,255,0.03); transition: var(--transition); display: block; text-decoration: none; color: var(--text-primary); }
        .story-card:hover { border-color: rgba(212, 175, 55, 0.4); transform: translateY(-8px); box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        .card-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.6; transition: 1.5s ease; }
        .story-card:hover .card-img { opacity: 0.85; transform: scale(1.05); }
        .card-overlay { position: absolute; bottom: 0; left: 0; width: 100%; height: 70%; background: linear-gradient(to top, rgba(5,5,5,1) 0%, rgba(5,5,5,0) 100%); z-index: 1; }
        
        .card-content { position: absolute; bottom: 40px; left: 40px; right: 40px; z-index: 2; }
        .card-date { font-family: 'Inter', sans-serif; font-size: 0.75rem; color: var(--gold); letter-spacing: 2px; margin-bottom: 10px; display: block; }
        .card-title { font-size: 2rem; font-weight: 700; line-height: 1.2; text-shadow: 0 4px 10px rgba(0,0,0,0.5); margin: 0; }

        .play-icon { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.8); width: 60px; height: 60px; background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.3); border-radius: 50%; display: flex; justify-content: center; align-items: center; z-index: 3; opacity: 0; transition: all 0.4s ease; backdrop-filter: blur(4px); pointer-events: none;}
        .play-icon::after { content: '▶'; color: #fff; font-size: 1.2rem; margin-left: 4px; }
        .story-card:hover .play-icon { opacity: 1; transform: translate(-50%, -50%) scale(1); }

        .load-more-container { text-align: center; margin-top: 60px; display: none; }
        .btn-load-more { display: inline-block; padding: 14px 40px; background: transparent; border: 1px solid rgba(255,255,255,0.2); color: var(--text-primary); font-family: 'Noto Sans SC', sans-serif; font-size: 0.95rem; font-weight: 500; letter-spacing: 2px; border-radius: 40px; cursor: pointer; transition: var(--transition); outline: none;}
        .btn-load-more:hover { border-color: var(--gold); color: var(--gold); transform: translateY(-3px); }

        @media (max-width: 900px) {
            .page-header { flex-direction: column; align-items: flex-start; }
            .story-grid { grid-template-columns: 1fr; gap: 30px; }
        }

        @media (max-width: 768px) {
            .breadcrumb-nav { padding: 20px 5vw; font-size: 0.75rem;}
            .container { padding: 30px 5vw 60px 5vw; }
            .page-header { gap: 20px; margin-bottom: 40px; }
            .title-area h1 { font-size: 2.2rem; }
            .title-area p { font-size: 0.95rem; }
            .search-wrapper { max-width: 100%; }
            #storySearch { font-size: 1rem; padding: 10px 0; }
            .story-card { border-radius: 6px; }
            .card-content { bottom: 25px; left: 20px; right: 20px; }
            .card-title { font-size: 1.4rem; }
            .play-icon { width: 50px; height: 50px; }
            .play-icon::after { font-size: 1rem; margin-left: 3px; }
            .btn-load-more { width: 100%; padding: 12px 0; font-size: 0.85rem; }
        }
    </style>

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-LJQMME1NDE"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-LJQMME1NDE');
    </script>
</head>
<body>

    <nav class="breadcrumb-nav">
        <a href="index.html" class="crumb-link">Home / 首页</a>
        <span class="crumb-separator">/</span>
        <span class="crumb-current">Stories / 旅行故事</span>
    </nav>

    <main class="container">
        <header class="page-header">
            <div class="title-area">
                <h1>旅行故事</h1>
                <p>记录这些年逃离日常后的真实心跳。</p>
            </div>
            <div class="search-wrapper">
                <input type="text" id="storySearch" placeholder="搜索故事标题...">
            </div>
        </header>

        <div class="story-grid" id="storyGrid"></div>
        
        <div class="load-more-container" id="loadMoreBox">
            <button class="btn-load-more" id="loadMoreBtn">探索更多记录 ↓</button>
        </div>
    </main>

    <script>
        function getFastCdnUrl(url) {
            if (!url) return '';
            if (url.startsWith('images/')) return `https://cdn.jsdelivr.net/gh/feixingjiadavid/DreamWorldDavid/${url}`;
            return url;
        }

        document.addEventListener("DOMContentLoaded", function() {
            const grid = document.getElementById('storyGrid');
            const searchInput = document.getElementById('storySearch');
            const loadMoreBox = document.getElementById('loadMoreBox');
            const loadMoreBtn = document.getElementById('loadMoreBtn');
            
            if (typeof dbData === 'undefined' || !dbData.stories) {
                grid.innerHTML = '<p style="color:var(--text-dimmed); font-family:Inter;">未检测到云端数据节点，请确保后台已发布文章。</p>';
                return;
            }

            let allStories = dbData.stories.sort((a, b) => new Date(b.date) - new Date(a.date));
            let currentDisplayList = [...allStories];
            let currentPage = 1;
            const itemsPerPage = 6; 

            const renderCards = (page, append = false) => {
                if (!append) grid.innerHTML = ''; 
                
                if (currentDisplayList.length === 0) {
                    grid.innerHTML = '<p style="color:var(--text-dimmed);">未能找到相关探险记录。</p>';
                    loadMoreBox.style.display = 'none';
                    return;
                }

                const startIndex = (page - 1) * itemsPerPage;
                const endIndex = page * itemsPerPage;
                const itemsToRender = currentDisplayList.slice(startIndex, endIndex);

                itemsToRender.forEach(story => {
                    const hasVideo = story.bilibili_bvid && story.bilibili_bvid.trim() !== '';
                    const playIconHtml = hasVideo ? `<div class="play-icon"></div>` : '';
                    const displayDate = (story.trip_date && story.trip_date.trim() !== '') ? story.trip_date : story.date;
                    
                    const cardHTML = `
                        <a href="story-detail.html?id=${story.id}" class="story-card">
                            <img src="${getFastCdnUrl(story.cover)}" class="card-img" alt="${story.title}">
                            <div class="card-overlay"></div>
                            ${playIconHtml}
                            <div class="card-content">
                                <span class="card-date">${displayDate.replace(/-/g, '.')}</span>
                                <h2 class="card-title">${story.title}</h2>
                            </div>
                        </a>
                    `;
                    grid.insertAdjacentHTML('beforeend', cardHTML);
                });

                if (endIndex >= currentDisplayList.length) {
                    loadMoreBox.style.display = 'none';
                } else {
                    loadMoreBox.style.display = 'block';
                }
            };

            renderCards(1);

            loadMoreBtn.addEventListener('click', () => {
                currentPage++;
                renderCards(currentPage, true);
            });

            searchInput.addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                currentDisplayList = allStories.filter(story => story.title.toLowerCase().includes(term));
                currentPage = 1;
                renderCards(1, false);
            });
        });
    </script>
</body>
</html>
