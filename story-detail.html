<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    
    <meta property="og:title" content="戴维的梦想世界 | 探索记录">
    <meta property="og:description" content="用真实的镜头带回极境的故事，不走马观花。">
    <meta property="og:image" content="https://images.unsplash.com/photo-1476610182048-b716b8518aae?q=80&w=1200&auto=format&fit=crop">
    <meta property="og:type" content="article">
    
    <title>故事加载中... | DAVID EXPEDITION</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <script>document.write('<script src="data.js?v=' + new Date().getTime() + '"><\/script>');</script>
    
    <style>
        :root { --bg-base: #050505; --text-primary: #FFFFFF; --text-dimmed: #888888; --gold: #D4AF37; --radius: 8px; --transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg-base); color: var(--text-primary); font-family: 'Noto Sans SC', sans-serif; -webkit-font-smoothing: antialiased; line-height: 1.8; overflow-x: hidden;}

        #init-loader { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--bg-base); z-index: 9999; display: flex; justify-content: center; align-items: center; transition: opacity 0.8s ease, visibility 0.8s ease; }
        .loader-brand { font-family: 'Inter', sans-serif; font-size: 1.2rem; font-weight: 700; letter-spacing: 6px; color: var(--gold); animation: breath 2s infinite ease-in-out;}
        @keyframes breath { 0% { opacity: 0.3; transform: scale(0.98); } 50% { opacity: 1; transform: scale(1); } 100% { opacity: 0.3; transform: scale(0.98); } }
        body.loaded #init-loader { opacity: 0; visibility: hidden; }

        .breadcrumb-nav { padding: 30px 6vw; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); font-family: 'Inter', sans-serif; font-size: 0.8rem; letter-spacing: 1px; white-space: nowrap; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none;}
        .breadcrumb-nav::-webkit-scrollbar { display: none; }
        .crumb-link { color: var(--text-dimmed); text-decoration: none; transition: color 0.3s; text-transform: uppercase; flex-shrink: 0;}
        .crumb-link:hover { color: var(--gold); }
        .crumb-separator { color: #444; font-size: 0.8rem; flex-shrink: 0;}
        .crumb-current { color: var(--text-primary); font-family: 'Noto Sans SC', sans-serif; overflow: hidden; text-overflow: ellipsis; max-width: 250px; flex-shrink: 0;}

        .container { max-width: 1200px; margin: 0 auto; padding: 40px 6vw 80px 6vw; }
        .media-container { width: 100%; border-radius: var(--radius); overflow: hidden; margin-bottom: 60px; background: #111; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 30px 60px rgba(0,0,0,0.5); aspect-ratio: 16/9;}
        .media-container iframe, .media-container img, .media-container video { width: 100%; height: 100%; object-fit: cover; display: block; border: none; }

        .story-grid-layout { display: grid; grid-template-columns: 1fr 1.2fr; gap: 60px; align-items: start; }
        .story-sidebar { padding-right: 20px; }
        .story-tag { font-family: 'Inter'; font-size: 0.8rem; color: var(--gold); letter-spacing: 4px; text-transform: uppercase; margin-bottom: 25px; display: block; font-weight: 700;}
        .story-title { font-size: clamp(2.2rem, 4vw, 3.5rem); font-weight: 900; line-height: 1.2; letter-spacing: -1px; margin-bottom: 25px; }
        .story-meta { color: var(--text-dimmed); font-size: 0.9rem; display: flex; align-items: center; gap: 5px; font-weight: 300; flex-wrap: wrap;}

        .story-article { border-left: 1px solid rgba(255,255,255,0.05); padding-left: 60px; }
        .story-content { font-size: 1.05rem; color: #CCCCCC; font-weight: 300; text-align: justify; line-height: 1.8; margin-bottom: 60px;}
        .story-content p { margin-bottom: 30px; }
        
        /* Markdown 增强解析样式 */
        .story-content img { max-width: 100%; border-radius: 6px; cursor: zoom-in; margin: 20px 0; transition: filter 0.3s ease; display: block;}
        .story-content img:hover { filter: brightness(1.1); }
        .story-content strong { color: #fff; font-weight: 700; box-shadow: inset 0 -10px 0 rgba(212,175,55,0.3);}
        .story-content a { color: var(--gold); text-decoration: none; border-bottom: 1px dashed var(--gold); transition: var(--transition);}
        .story-content a:hover { color: #fff; border-bottom-color: #fff;}

        .cta-block { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 35px; flex-wrap: wrap; gap: 20px;}
        .cta-text { color: var(--text-dimmed); font-size: 0.95rem; font-weight: 300;}
        .cta-btn { padding: 12px 30px; background: transparent; color: var(--gold); border: 1px solid var(--gold); border-radius: 40px; text-decoration: none; font-size: 0.9rem; font-weight: 500; transition: var(--transition); white-space: nowrap;}
        .cta-btn:hover { background: rgba(212,175,55,0.1); transform: translateX(5px); }

        .action-bar { display: flex; gap: 20px; align-items: center; margin-top: 50px; padding-top: 30px; border-top: 1px dashed rgba(255,255,255,0.1); }
        .action-btn { background: transparent; border: none; color: var(--text-dimmed); font-family: var(--font-zh); font-size: 0.85rem; letter-spacing: 2px; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: var(--transition); outline: none; padding: 0;}
        .action-btn:hover { color: var(--gold); transform: translateY(-2px); }
        .action-btn svg { width: 16px; height: 16px; fill: currentColor; }
        
        /* 流量闭环系统：相关推荐 */
        .related-section { max-width: 1200px; margin: 0 auto; padding: 40px 6vw 80px 6vw; border-top: 1px solid rgba(255,255,255,0.05); }
        .related-title { font-family: 'Inter'; font-size: 0.8rem; color: var(--text-dimmed); letter-spacing: 4px; text-transform: uppercase; margin-bottom: 30px; text-align: center;}
        .related-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 30px; }
        .related-card { position: relative; border-radius: var(--radius); overflow: hidden; aspect-ratio: 16/9; background: #111; cursor: pointer; display: block; border: 1px solid rgba(255,255,255,0.03); transition: var(--transition); }
        .related-card:hover { transform: translateY(-5px); border-color: rgba(212,175,55,0.3); box-shadow: 0 15px 30px rgba(0,0,0,0.5); }
        .r-card-img { width: 100%; height: 100%; object-fit: cover; opacity: 0.5; transition: 1s ease; }
        .related-card:hover .r-card-img { opacity: 0.8; transform: scale(1.05); }
        .r-card-overlay { position: absolute; bottom: 0; left: 0; width: 100%; height: 80%; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); z-index: 1;}
        .r-card-content { position: absolute; bottom: 25px; left: 25px; right: 25px; z-index: 2;}
        .r-card-tag { color: var(--gold); font-size: 0.7rem; letter-spacing: 2px; margin-bottom: 8px; display: block;}
        .r-card-title { color: #fff; font-size: 1.3rem; font-weight: 700; margin: 0; line-height: 1.3;}

        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: #111; border: 1px solid var(--gold); color: var(--gold); padding: 12px 25px; border-radius: 40px; font-size: 0.85rem; letter-spacing: 1px; opacity: 0; transition: var(--transition); z-index: 9999; box-shadow: 0 10px 30px rgba(0,0,0,0.8); pointer-events: none; }
        #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .back-to-top { position: fixed; bottom: 40px; right: 40px; width: 45px; height: 45px; border-radius: 50%; background: rgba(17,17,17,0.8); border: 1px solid rgba(212,175,55,0.3); color: var(--gold); font-size: 1.2rem; cursor: pointer; display: flex; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: var(--transition); z-index: 99; backdrop-filter: blur(5px);}
        .back-to-top.show { opacity: 1; visibility: visible; transform: translateY(0); }
        .back-to-top:hover { background: var(--gold); color: #000; border-color: var(--gold); }

        .lightbox-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.95); z-index: 10000; display: flex; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: var(--transition); cursor: zoom-out; backdrop-filter: blur(10px); }
        .lightbox-overlay.active { opacity: 1; visibility: visible; }
        .lightbox-img { max-width: 95vw; max-height: 95vh; object-fit: contain; transform: scale(0.9); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); border-radius: 4px; box-shadow: 0 20px 50px rgba(0,0,0,0.8);}
        .lightbox-overlay.active .lightbox-img { transform: scale(1); }
        .site-footer { border-top: 1px solid rgba(255,255,255,0.05); padding: 40px 0; text-align: center; font-family: 'Inter'; font-size: 0.8rem; color: var(--text-dimmed); letter-spacing: 2px; }
        #loadingState { text-align: center; color: var(--gold); letter-spacing: 2px; margin-top: 100px; font-family: 'Inter'; display: none; }

        @media (max-width: 900px) {
            .story-grid-layout { grid-template-columns: 1fr; gap: 40px; }
            .story-article { border-left: none; padding-left: 0; }
            .story-sidebar { padding-right: 0; }
        }
        @media (max-width: 768px) {
            .breadcrumb-nav { padding: 20px 5vw; font-size: 0.75rem;}
            .crumb-current { max-width: none; } 
            .container { padding: 20px 5vw 60px 5vw; }
            .media-container { border-radius: 0; margin-left: -5vw; width: 100vw; margin-bottom: 30px; border-left: none; border-right: none;}
            .story-tag { font-size: 0.75rem; margin-bottom: 15px; }
            .story-title { font-size: 1.8rem; margin-bottom: 15px; line-height: 1.3;}
            .story-meta { font-size: 0.8rem; flex-wrap: wrap; }
            .story-content { font-size: 0.95rem; text-align: left; } 
            .story-content p { margin-bottom: 20px; }
            .cta-block { flex-direction: column; align-items: flex-start; gap: 15px; padding-top: 25px;}
            .cta-btn { width: 100%; text-align: center; }
            .action-bar { margin-top: 30px; padding-top: 20px; justify-content: space-around; width: 100%;}
            .back-to-top { bottom: 25px; right: 25px; width: 44px; height: 44px; font-size: 1.1rem;}
            .related-section { padding: 30px 5vw 60px 5vw; }
            .related-grid { grid-template-columns: 1fr; gap: 20px; }
            .r-card-title { font-size: 1.1rem; }
        }
    </style>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-LJQMME1NDE"></script>
    <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-LJQMME1NDE');</script>
</head>
<body>
    <div id="init-loader"><div class="loader-brand">DAVID EXPEDITION</div></div>
    <nav class="breadcrumb-nav">
        <a href="index.html" class="crumb-link">Home / 首页</a><span class="crumb-separator">/</span>
        <a href="stories.html" class="crumb-link">Stories / 旅行故事</a><span class="crumb-separator">/</span>
        <span class="crumb-current" id="r_breadcrumb_title">读取中...</span>
    </nav>
    <div id="loadingState">读取数据中...</div>

    <main class="container" id="mainContent" style="display: none;">
        <div class="media-container" id="r_media"></div>
        <div class="story-grid-layout">
            <aside class="story-sidebar">
                <span class="story-tag">EXPEDITION LOG</span>
                <h1 class="story-title" id="r_title"></h1>
                <div class="story-meta">
                    记录于 <span id="r_date" style="color: #fff; margin: 0 5px;"></span> // 地点：<span id="r_location" style="color: #fff; margin-left: 5px;">未知</span>
                </div>
            </aside>
            <article class="story-article">
                <div class="story-content" id="r_content"></div>
                <div class="cta-block" id="ctaContainer" style="display: none;">
                    <span class="cta-text" id="r_cta_text"></span>
                    <a href="#" class="cta-btn" id="r_cta_link">获取本篇详细攻略 ↗</a>
                </div>
                <div class="action-bar">
                    <button class="action-btn" onclick="sharePage()"><svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg>分享</button>
                    <button class="action-btn" onclick="bookmarkPage()"><svg viewBox="0 0 24 24"><path d="M17 3H7c-1.1 0-1.99.9-1.99 2L5 21l7-3 7 3V5c0-1.1-.9-2-2-2z"/></svg>收藏</button>
                </div>
            </article>
        </div>
    </main>

    <section class="related-section" id="relatedSection" style="display: none;">
        <div class="related-title">CONTINUE EXPLORING / 延伸阅读</div>
        <div class="related-grid" id="r_related_grid"></div>
    </section>

    <button id="backToTop" class="back-to-top" title="回到顶部">↑</button>
    <footer class="site-footer">© 2026 DAVID EXPEDITION.</footer>

    <div class="lightbox-overlay" id="globalLightbox"><img src="" class="lightbox-img" id="lightboxImg"></div>
    <div id="toast">提示信息</div>

    <script>
        function getFastCdnUrl(url) { if (!url) return ''; if (url.startsWith('images/')) return `https://cdn.jsdelivr.net/gh/feixingjiadavid/DreamWorldDavid/${url}`; return url; }
        function sharePage() { if(navigator.share){navigator.share({title:document.title,url:window.location.href}).catch(console.error);}else{navigator.clipboard.writeText(window.location.href);showToast("✓ 链接已复制！");} }
        function bookmarkPage() { showToast(/macintosh|mac os x/i.test(navigator.userAgent.toLowerCase()) ? `⭐ 请按 ⌘+D 收藏` : `⭐ 请按 Ctrl+D 收藏`); }
        function showToast(msg) { const t = document.getElementById('toast'); t.innerText = msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 3000); }

        // 极简 Markdown 解析引擎
        function parseMarkdown(text) {
            let html = text;
            html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>'); // 加粗
            html = html.replace(/!\[(.*?)\]\((.*?)\)/g, '<img src="$2" alt="$1" loading="lazy">'); // 图片
            html = html.replace(/\[(.*?)\]\((.*?)\)/g, '<a href="$2" target="_blank">$1</a>'); // 链接
            return html;
        }

        const backToTopBtn = document.getElementById('backToTop');
        window.addEventListener('scroll', () => { window.scrollY > 400 ? backToTopBtn.classList.add('show') : backToTopBtn.classList.remove('show'); });
        backToTopBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

        function bindLightbox() {
            const lb = document.getElementById('globalLightbox'); const lbImg = document.getElementById('lightboxImg');
            document.querySelectorAll('.story-content img').forEach(img => {
                img.addEventListener('click', function() { lbImg.src = this.src; lb.classList.add('active'); });
            });
            lb.addEventListener('click', function() { this.classList.remove('active'); setTimeout(() => lbImg.src = '', 400); });
        }

        document.addEventListener("DOMContentLoaded", function() {
            const loaderTimeout = setTimeout(() => document.body.classList.add('loaded'), 2500);
            function removeLoader() { clearTimeout(loaderTimeout); setTimeout(() => document.body.classList.add('loaded'), 300); }

            const storyId = new URLSearchParams(window.location.search).get('id');
            if (!storyId || typeof dbData === 'undefined' || !dbData.stories) { removeLoader(); return; }
            
            const story = dbData.stories.find(s => s.id === storyId);
            if (!story) { document.getElementById('loadingState').innerText="未找到故事"; return; }

            document.title = `${story.title} | DAVID EXPEDITION`;
            document.getElementById('r_breadcrumb_title').innerText = story.title;
            document.getElementById('r_title').innerHTML = story.title.replace('：', '：<br>');
            document.getElementById('r_date').innerText = ((story.trip_date && story.trip_date.trim()) ? story.trip_date : story.date).replace(/-/g, '.');
            document.getElementById('r_location').innerText = story.location || "未知";

            const mediaBox = document.getElementById('r_media');
            const coverUrl = getFastCdnUrl(story.cover);
            if (story.bilibili_bvid && story.bilibili_bvid.trim()) {
                let vid = story.bilibili_bvid.trim();
                if (!vid.endsWith('.mp4')) { const m = vid.match(/(BV[a-zA-Z0-9]+)/); if (m) vid = m[1]; }
                mediaBox.innerHTML = vid.endsWith('.mp4') ? `<video controls poster="${coverUrl}"><source src="${vid}" type="video/mp4"></video>` : `<iframe src="//player.bilibili.com/player.html?bvid=${vid}&page=1&high_quality=1&danmaku=0" scrolling="no" border="0" frameborder="no" framespacing="0" allowfullscreen="true"></iframe>`;
            } else { mediaBox.innerHTML = `<img src="${coverUrl}">`; }

            const contentBox = document.getElementById('r_content');
            story.paragraphs.forEach(para => { contentBox.innerHTML += `<p>${parseMarkdown(getFastCdnUrl(para))}</p>`; }); // 兼容CDN解析

            if (story.cta_link && story.cta_link.trim()) {
                document.getElementById('ctaContainer').style.display = 'flex';
                document.getElementById('r_cta_text').innerText = story.cta_text || "了解更多详情";
                document.getElementById('r_cta_link').href = story.cta_link;
            }

            // 渲染相关推荐 (排除自己，随机选2篇)
            const relatedGrid = document.getElementById('r_related_grid');
            let others = dbData.stories.filter(s => s.id !== storyId);
            if (others.length > 0) {
                document.getElementById('relatedSection').style.display = 'block';
                others.sort(() => 0.5 - Math.random()); 
                others.slice(0, 2).forEach(item => {
                    relatedGrid.innerHTML += `
                        <a href="story-detail.html?id=${item.id}" class="related-card">
                            <img src="${getFastCdnUrl(item.cover)}" class="r-card-img" loading="lazy">
                            <div class="r-card-overlay"></div>
                            <div class="r-card-content"><span class="r-card-tag">STORY</span><h3 class="r-card-title">${item.title}</h3></div>
                        </a>`;
                });
            }

            document.getElementById('mainContent').style.display = 'block';
            bindLightbox(); removeLoader();
        });
    </script>
</body>
</html>
