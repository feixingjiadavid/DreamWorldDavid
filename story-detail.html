    <style>
        :root { --bg-base: #050505; --text-primary: #FFFFFF; --text-dimmed: #888888; --gold: #D4AF37; --border: rgba(255,255,255,0.05); --radius: 8px; --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); --font-mono: 'JetBrains Mono', monospace;}
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg-base); color: var(--text-primary); font-family: 'Noto Sans SC', sans-serif; -webkit-font-smoothing: antialiased; line-height: 1.8; overflow-x: hidden; display: flex; flex-direction: column; min-height: 100vh;}

        #init-loader { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--bg-base); z-index: 9999; display: flex; justify-content: center; align-items: center; transition: opacity 0.5s ease, visibility 0.5s ease; }
        .loader-brand { font-family: 'Noto Sans SC', sans-serif; font-size: 1.2rem; font-weight: 700; letter-spacing: 4px; color: var(--gold); animation: breath 2s infinite ease-in-out; text-transform: uppercase;}
        @keyframes breath { 0% { opacity: 0.3; transform: scale(0.98); } 50% { opacity: 1; transform: scale(1); } 100% { opacity: 0.3; transform: scale(0.98); } }
        body.loaded #init-loader { opacity: 0; visibility: hidden; }

        nav { display: flex; justify-content: space-between; align-items: center; padding: 30px 6vw; font-size: 0.95rem; font-weight: 500; letter-spacing: 1px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: rgba(5,5,5,0.8); backdrop-filter: blur(20px); z-index: 100;}
        .nav-brand a { color: var(--text-primary); text-decoration: none; font-weight: 700; font-size: 1.2rem; letter-spacing: 2px; transition: color 0.3s ease; position: relative; z-index: 101;}
        .nav-brand a:hover { color: var(--gold); } 
        .nav-links { display: flex; gap: 50px; align-items: center; }
        .nav-links a { color: var(--text-dimmed); text-decoration: none; position: relative; padding-bottom: 6px; transition: color 0.3s ease; letter-spacing: 1px; white-space: nowrap;}
        .nav-links a:hover, .nav-links a.active { color: var(--text-primary); }
        .nav-links a.active::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 2px; background-color: var(--text-primary); }
        .mobile-menu-btn { display: none; background: transparent; border: none; color: #fff; font-size: 1.8rem; cursor: pointer; z-index: 101; position: relative; width: 40px; height: 40px; }
        
        .mobile-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(5,5,5,0.98); backdrop-filter: blur(15px); z-index: 99; display: flex; flex-direction: column; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: var(--transition); }
        .mobile-overlay.active { opacity: 1; visibility: visible; }
        .mobile-overlay a { color: #fff; text-decoration: none; font-size: 2rem; font-weight: 700; letter-spacing: 4px; margin: 20px 0; opacity: 0; transform: translateY(20px); transition: var(--transition); }
        .mobile-overlay.active a { opacity: 1; transform: translateY(0); }
        .mobile-overlay a.active { color: var(--gold); }

        .breadcrumb-nav { padding: 30px 6vw; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border); font-family: 'Inter', sans-serif; font-size: 0.8rem; letter-spacing: 1px; white-space: nowrap; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none;}
        .breadcrumb-nav::-webkit-scrollbar { display: none; }
        .crumb-link { color: var(--text-dimmed); text-decoration: none; transition: color 0.3s;}
        .crumb-link:hover { color: var(--gold); }
        .crumb-separator { color: #444; font-size: 0.8rem; flex-shrink: 0;}
        .crumb-current { color: var(--text-primary); font-family: 'Noto Sans SC', sans-serif; overflow: hidden; text-overflow: ellipsis; max-width: 250px; flex-shrink: 0;}

        .container { max-width: 1200px; margin: 0 auto; padding: 40px 6vw 80px 6vw; flex: 1; width: 100%;}
        
        @keyframes imgFadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .media-container { width: 100%; border-radius: var(--radius); overflow: hidden; margin-bottom: 60px; background: #111; border: 1px solid var(--border); box-shadow: 0 30px 60px rgba(0,0,0,0.5); aspect-ratio: 16/9; position: relative;}
        .media-container iframe, .media-container img, .media-container video { width: 100%; height: 100%; object-fit: cover; display: block; border: none; animation: imgFadeIn 0.8s ease forwards;}
        .facade-play { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80px; height: 80px; background: rgba(0,0,0,0.7); border: 2px solid rgba(255,255,255,0.4); border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.3s; z-index: 2; backdrop-filter: blur(5px);}
        .facade-play::after { content: '▶'; color: #fff; font-size: 1.5rem; margin-left: 5px; }
        .facade-play:hover { background: var(--gold); border-color: var(--gold); transform: translate(-50%, -50%) scale(1.1); }
        .facade-cover { cursor: pointer; }

        .story-grid-layout { display: grid; grid-template-columns: 1fr 1.2fr; gap: 60px; align-items: start; }
        .story-sidebar { padding-right: 20px; }
        .story-tag { font-family: 'Inter'; font-size: 0.8rem; color: var(--gold); letter-spacing: 4px; text-transform: uppercase; margin-bottom: 25px; display: block; font-weight: 700;}
        .story-title { font-size: clamp(2.2rem, 4vw, 3.5rem); font-weight: 900; line-height: 1.2; letter-spacing: -1px; margin-bottom: 25px; }
        .story-meta { color: var(--text-dimmed); font-size: 0.9rem; display: flex; align-items: center; gap: 5px; font-weight: 300; flex-wrap: wrap;}

        .story-article { border-left: 1px solid var(--border); padding-left: 60px; }
        .story-content { font-size: 1.05rem; color: #CCCCCC; font-weight: 300; text-align: justify; line-height: 1.8; margin-bottom: 60px;}
        .story-content p { margin-bottom: 30px; }
        
        .story-content img { max-width: 100%; border-radius: 6px; cursor: zoom-in; margin: 20px 0; transition: filter 0.3s ease; display: block; animation: imgFadeIn 0.8s ease forwards;}
        .story-content img:hover { filter: brightness(1.1); }
        .story-content strong { color: #fff; font-weight: 700; box-shadow: inset 0 -10px 0 rgba(212,175,55,0.3);}
        .story-content a { color: var(--gold); text-decoration: none; border-bottom: 1px dashed var(--gold); transition: var(--transition);}
        .story-content a:hover { color: #fff; border-bottom-color: #fff;}
        .story-content .highlight-gold { color: var(--gold); font-weight: 700; }
        
        .pull-quote { border-left: 3px solid var(--gold); background: rgba(212, 175, 55, 0.05); padding: 15px 20px; margin: 25px 0; color: #E0E0E0; font-size: 1.1rem; font-style: italic; border-radius: 0 8px 8px 0; position: relative; }
        .pull-quote::before { content: '“'; position: absolute; top: -10px; left: 10px; font-size: 3rem; color: rgba(212, 175, 55, 0.2); font-family: Georgia, serif; line-height: 1; }

        .cta-block { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border); padding-top: 35px; flex-wrap: wrap; gap: 20px;}
        .cta-text { color: var(--text-dimmed); font-size: 0.95rem; font-weight: 300;}
        .cta-btn { padding: 12px 30px; background: transparent; color: var(--gold); border: 1px solid var(--gold); border-radius: 40px; text-decoration: none; font-size: 0.9rem; font-weight: 500; transition: var(--transition); white-space: nowrap;}
        .cta-btn:hover { background: rgba(212,175,55,0.1); transform: translateX(5px); }

        .action-bar { display: flex; gap: 20px; align-items: center; margin-top: 50px; padding-top: 30px; border-top: 1px dashed rgba(255,255,255,0.1); position: relative; z-index: 20; }
        .action-btn { background: transparent; border: none; color: var(--text-dimmed); font-family: 'Noto Sans SC', sans-serif; font-size: 0.85rem; letter-spacing: 2px; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: var(--transition); outline: none; padding: 10px; position: relative; z-index: 20;}
        .action-btn:hover { color: var(--gold); transform: translateY(-2px); }
        .action-btn svg { width: 16px; height: 16px; fill: currentColor; pointer-events: none;}
        
        .related-section { max-width: 1200px; margin: 0 auto; padding: 40px 6vw 80px 6vw; border-top: 1px solid var(--border); }
        .related-title { font-family: 'Inter'; font-size: 0.8rem; color: var(--text-dimmed); letter-spacing: 4px; text-transform: uppercase; margin-bottom: 30px; text-align: center;}
        .related-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 40px; }
        .related-card { position: relative; border-radius: var(--radius); overflow: hidden; aspect-ratio: 16/9; background: #111; cursor: pointer; display: block; border: 1px solid rgba(255,255,255,0.03); transition: var(--transition); }
        .related-card:hover { transform: translateY(-5px); border-color: rgba(212,175,55,0.3); box-shadow: 0 15px 30px rgba(0,0,0,0.5); }
        .r-card-img { width: 100%; height: 100%; object-fit: cover; opacity: 0.5; transition: 1s ease; }
        .related-card:hover .r-card-img { opacity: 0.8; transform: scale(1.05); }
        .r-card-overlay { position: absolute; bottom: 0; left: 0; width: 100%; height: 80%; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); z-index: 1;}
        .r-card-content { position: absolute; bottom: 25px; left: 25px; right: 25px; z-index: 2;}
        .r-card-tag { color: var(--gold); font-size: 0.7rem; letter-spacing: 2px; margin-bottom: 8px; display: block; font-family: 'Inter'; font-weight: 700;}
        .r-card-title { color: #fff; font-size: 1.3rem; font-weight: 700; margin: 0; line-height: 1.3;}

        .lightbox-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.96); z-index: 10000; display: flex; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: var(--transition); backdrop-filter: blur(10px); }
        .lightbox-overlay.active { opacity: 1; visibility: visible; }
        .lightbox-img { max-width: 95vw; max-height: 90vh; object-fit: contain; transform: scale(0.9); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); user-select: none;}
        .lightbox-overlay.active .lightbox-img { transform: scale(1); }
        .lb-btn { position: absolute; top: 50%; transform: translateY(-50%); width: 50px; height: 50px; background: rgba(255,255,255,0.1); border: none; border-radius: 50%; color: #fff; font-size: 1.5rem; cursor: pointer; z-index: 10001; transition: 0.3s; display: flex; justify-content: center; align-items: center;}
        .lb-btn:hover { background: var(--gold); color: #000; }
        .lb-prev { left: 20px; }
        .lb-next { right: 20px; }
        .lb-close { position: absolute; top: 20px; right: 20px; width: 40px; height: 40px; background: rgba(255,255,255,0.1); color:#fff; border:none; border-radius:50%; font-size:1.2rem; cursor:pointer; z-index:10001; transition:0.3s;}
        .lb-close:hover { background: #ff4d4f; }
        .lb-counter { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.6); font-family: var(--font-mono); font-size: 0.85rem; letter-spacing: 2px;}

        .share-modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.92); backdrop-filter: blur(20px); z-index: 11000; display: flex; flex-direction: column; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: var(--transition); }
        .share-modal-overlay.active { opacity: 1; visibility: visible; }
        .share-card { background: #0A0A0A; border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; width: 88%; max-width: 360px; overflow: hidden; transform: translateY(30px) scale(0.95); transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); box-shadow: 0 30px 60px rgba(0,0,0,0.8); position: relative;}
        .share-modal-overlay.active .share-card { transform: translateY(0) scale(1); }
        .close-share { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.8); border: 1px solid rgba(255,255,255,0.2); color: #fff; width: 34px; height: 34px; border-radius: 50%; font-size: 1.1rem; cursor: pointer; z-index: 9999 !important; display:flex; justify-content:center; align-items:center; transition: 0.3s;}
        .close-share:hover { background: #ff4d4f; border-color: #ff4d4f; }
        .share-card-cover { width: 100%; height: 200px; position: relative; background: #222; overflow: hidden;}
        .share-card-cover img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .share-card-content { padding: 0 25px 30px 25px; position: relative; z-index: 2; margin-top: -30px;}
        .share-card-tag { font-family: var(--font-mono); font-size: 0.65rem; color: var(--gold); letter-spacing: 3px; margin-bottom: 12px; }
        .share-card-title { font-size: 1.4rem; font-weight: 700; line-height: 1.35; margin-bottom: 30px; letter-spacing: -0.5px;}
        .share-brand { font-family: 'Inter'; font-size: 0.75rem; font-weight: 900; letter-spacing: 3px; color: var(--text-dimmed); line-height: 1.5; text-transform: uppercase;}
        .share-brand span { font-family: 'Noto Sans SC', sans-serif; font-weight: 300; font-size: 0.65rem; letter-spacing: 1px; color: #555; display: block; margin-top: 5px; text-transform: none;}
        .qr-wrapper { background: #fff; padding: 6px; border-radius: 6px; width: 64px; height: 64px; flex-shrink: 0; position: absolute; right: 25px; bottom: 30px;}
        .share-actions { display: flex; flex-direction: column; align-items: center; margin-top: 30px; opacity: 0; transform: translateY(10px); transition: 0.5s; transition-delay: 0.2s; position: relative; z-index: 102;}
        .share-modal-overlay.active .share-actions { opacity: 1; transform: translateY(0); }
        .share-tip { font-size: 0.8rem; color: var(--text-dimmed); letter-spacing: 1px; margin-bottom: 15px;}
        .share-copy-btn { padding: 14px 35px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; border-radius: 40px; cursor: pointer; font-size: 0.85rem; transition: 0.3s; outline: none;}
        .share-copy-btn:hover { background: #fff; color: #000;}
        #generatedShareImage { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; z-index: 50; cursor: pointer; border-radius: 16px; display: none;}

        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: #111; border: 1px solid var(--gold); color: var(--gold); padding: 12px 25px; border-radius: 40px; font-size: 0.85rem; letter-spacing: 1px; opacity: 0; transition: var(--transition); z-index: 9999; box-shadow: 0 10px 30px rgba(0,0,0,0.8); pointer-events: none; }
        #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .back-to-top { position: fixed; bottom: 40px; right: 40px; width: 45px; height: 45px; border-radius: 50%; background: rgba(17,17,17,0.8); border: 1px solid rgba(212,175,55,0.3); color: var(--gold); font-size: 1.2rem; cursor: pointer; display: flex; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: var(--transition); z-index: 99; backdrop-filter: blur(5px);}
        .back-to-top.show { opacity: 1; visibility: visible; transform: translateY(0); }
        .site-footer { border-top: 1px solid var(--border); padding: 40px 0; text-align: center; font-family: 'Inter'; font-size: 0.8rem; color: var(--text-dimmed); letter-spacing: 2px; }
        
        .error-state { text-align: center; padding: 100px 20px; }
        .error-title { font-size: 2rem; color: #ff4d4f; margin-bottom: 20px; font-weight: 700;}
        .error-desc { color: #888; margin-bottom: 40px; line-height: 1.6;}
        .btn-home { display: inline-block; padding: 12px 30px; border: 1px solid var(--gold); color: var(--gold); text-decoration: none; border-radius: 30px; transition: 0.3s; }
        .btn-home:hover { background: rgba(212,175,55,0.1); transform: translateY(-3px);}

        @media (max-width: 900px) {
            .story-grid-layout { grid-template-columns: 1fr; gap: 40px; }
            .story-article { border-left: none; padding-left: 0; }
            .story-sidebar { padding-right: 0; }
            .lb-btn { display: none; }
        }
        @media (max-width: 768px) {
            nav { padding: 20px 5vw; border-bottom: none; background: var(--bg-base); position: relative;}
            .nav-links { display: none; }
            .mobile-menu-btn { display: block; }
            .nav-brand a { font-size: 1.1rem; letter-spacing: 2px; }

            .breadcrumb-nav { padding: 20px 5vw; font-size: 0.75rem;}
            .crumb-current { max-width: none; } 
            .container { padding: 20px 5vw 60px 5vw; }
            .media-container { border-radius: 0; margin-left: -5vw; width: 100vw; margin-bottom: 30px; border-left: none; border-right: none;}
            .story-tag { font-size: 0.75rem; margin-bottom: 15px; }
            .story-title { font-size: 1.8rem; margin-bottom: 15px; line-height: 1.3;}
            .story-meta { font-size: 0.8rem; flex-wrap: wrap; }
            .story-content { font-size: 0.95rem; text-align: left; } 
            .story-content p { margin-bottom: 20px; }
            .cta-block { flex-direction: column; align-items: flex-start; gap: 15px; padding-top: 25px;}
            .cta-btn { width: 100%; text-align: center; }
            .action-bar { margin-top: 30px; padding-top: 20px; justify-content: space-around; width: 100%;}
            .back-to-top { bottom: 25px; right: 25px; width: 44px; height: 44px; font-size: 1.1rem;}
            .related-section { padding: 30px 5vw 60px 5vw; }
            .related-grid { grid-template-columns: 1fr; gap: 20px; }
            .r-card-title { font-size: 1.1rem; }
        }
    </style>
</head>

    </main>

    <section class="related-section" id="relatedSection" style="display: none;">
        <div class="related-title">CONTINUE EXPLORING / 延伸阅读</div>
        <div class="related-grid" id="r_related_grid"></div>
    </section>

    <div class="lightbox-overlay" id="globalLightbox">
        <button class="lb-close" onclick="closeLightbox()">✕</button>
        <button class="lb-btn lb-prev" onclick="navLightbox(-1)">‹</button>
        <img src="" class="lightbox-img" id="lightboxImg">
        <button class="lb-btn lb-next" onclick="navLightbox(1)">›</button>
        <div class="lb-counter" id="lbCounter">1 / 1</div>
    </div>

    <div class="share-modal-overlay" id="shareModal">
        <div class="share-card" id="shareCardHTML">
            <button class="close-share" onclick="closeShareModal()">✕</button>
            <div class="share-card-cover"><img src="" id="shareCoverImg" crossorigin="anonymous"></div>
            <div class="share-card-content">
                <div class="share-card-tag">STORY LOG</div>
                <h3 class="share-card-title" id="shareTitle">加载中...</h3>
                <div style="border-top: 1px dashed rgba(255,255,255,0.1); padding-top: 25px; min-height: 80px;">
                    <div class="share-brand">戴维的梦想世界<span>探索世界隐秘的B面</span></div>
                    <div class="qr-wrapper" id="qrcode-container"></div>
                </div>
            </div>
            <img src="" id="generatedShareImage">
        </div>
        <div class="share-actions">
            <p class="share-tip" id="shareTipText">提取视觉资产中...</p>
            <button class="share-copy-btn" onclick="copyShareText()">📄 复制精美图文链接</button>
        </div>
    </div>

    <button id="backToTop" class="back-to-top" title="回到顶部">↑</button>
    <footer class="site-footer">© 2026 戴维的梦想世界.</footer>
    <div id="toast">提示信息</div>

    <script>
        let currentArticleData = null; 

        const menuToggle = document.getElementById('menuToggle');
        const mobileOverlay = document.getElementById('mobileOverlay');
        let isMenuOpen = false;
        if(menuToggle && mobileOverlay) {
            menuToggle.addEventListener('click', () => {
                isMenuOpen = !isMenuOpen;
                if(isMenuOpen) {
                    mobileOverlay.classList.add('active');
                    menuToggle.innerText = '✕';
                    document.body.style.overflow = 'hidden';
                } else {
                    mobileOverlay.classList.remove('active');
                    menuToggle.innerText = '☰';
                    document.body.style.overflow = 'auto';
                }
            });
        }

        function dismissGlobalLoader() { document.body.classList.add('loaded'); }
        function getFastCdnUrl(url) { if (!url) return ''; return url.startsWith('images/') ? `https://cdn.jsdelivr.net/gh/feixingjiadavid/DreamWorldDavid/${url}` : url; }
        
        function loadIframeVideo(vid, coverUrl) {
            const box = document.getElementById('r_media');
            box.innerHTML = `<iframe src="//player.bilibili.com/player.html?bvid=${vid}&page=1&high_quality=1&danmaku=0" scrolling="no" border="0" frameborder="no" framespacing="0" allowfullscreen="true" style="width:100%; height:100%;"></iframe>`;
        }

        let galleryImages = []; let currentGalleryIndex = 0;
        const lightbox = document.getElementById('globalLightbox'); const lbImg = document.getElementById('lightboxImg'); const lbCounter = document.getElementById('lbCounter');
        
        function initLightbox() {
            galleryImages = Array.from(document.querySelectorAll('.story-content img'));
            galleryImages.forEach((img, idx) => {
                img.style.cursor = 'zoom-in';
                img.addEventListener('click', () => {
                    currentGalleryIndex = idx; updateLightbox();
                    lightbox.classList.add('active'); document.body.style.overflow = 'hidden';
                });
            });
        }
        function updateLightbox() {
            if(galleryImages.length === 0) return;
            lbImg.src = galleryImages[currentGalleryIndex].src;
            lbCounter.innerText = `${currentGalleryIndex + 1} / ${galleryImages.length}`;
        }
        function navLightbox(dir) {
            currentGalleryIndex += dir;
            if(currentGalleryIndex < 0) currentGalleryIndex = galleryImages.length - 1;
            if(currentGalleryIndex >= galleryImages.length) currentGalleryIndex = 0;
            updateLightbox();
        }
        function closeLightbox() { lightbox.classList.remove('active'); document.body.style.overflow = 'auto'; setTimeout(() => lbImg.src = '', 400); }
        
        let touchStartX = 0; let touchEndX = 0;
        lightbox.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; });
        lightbox.addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].screenX;
            if(touchStartX - touchEndX > 50) navLightbox(1);
            if(touchEndX - touchStartX > 50) navLightbox(-1);
        });

        document.getElementById('shareModal').addEventListener('click', function(e) {
            if (e.target === this) closeShareModal();
        });
        
        async function openShareModal() {
            if(!currentArticleData) return;
            const modal = document.getElementById('shareModal'); const tip = document.getElementById('shareTipText');
            const target = document.getElementById('shareCardHTML'); const generatedImg = document.getElementById('generatedShareImage'); const coverImg = document.getElementById('shareCoverImg');
            
            generatedImg.style.display = 'none'; generatedImg.src = ''; tip.innerText = "⏳ 正在拉取高清影像..."; document.getElementById('shareTitle').innerText = currentArticleData.title;
            const qrContainer = document.getElementById('qrcode-container'); qrContainer.innerHTML = ''; 
            new QRCode(qrContainer, { text: window.location.href, width: 52, height: 52, colorDark : "#000", colorLight : "#fff", correctLevel : QRCode.CorrectLevel.M });
            modal.classList.add('active');

            try {
                await new Promise((resolve) => { coverImg.onload = resolve; coverImg.onerror = resolve; const cleanUrl = currentArticleData.cover; coverImg.src = cleanUrl + (cleanUrl.includes('?') ? '&' : '?') + 'cors_bypass=' + Date.now(); });
                tip.innerText = "⏳ 正在生成专属分享海报..."; await new Promise(r => setTimeout(r, 300));
                const canvas = await html2canvas(target, { useCORS: true, allowTaint: false, scale: 2, backgroundColor: "#0A0A0A", logging: false });
                const imgData = canvas.toDataURL("image/jpeg", 0.9);
                tip.innerText = "👍 生成成功！请长按上方海报保存，或点击 X 关闭";
                generatedImg.src = imgData; generatedImg.style.display = 'block'; generatedImg.style.opacity = '0.01'; 
            } catch (e) { tip.innerText = "❌ 海报生成失败，请尝试直接手机截屏"; }
        }
        function closeShareModal() { document.getElementById('shareModal').classList.remove('active'); document.getElementById('shareTipText').innerText = "海报生成中..."; }
        function copyShareText() { navigator.clipboard.writeText(`▬ 戴维的梦想世界 ▬\n\n《${document.title.split(' | ')[0]}》\n探索世界隐秘的B面 ↘\n${window.location.href}`); showToast('✓ 专属邀请文案已复制！'); closeShareModal(); }

        function bookmarkPage() { showToast(/macintosh|mac os x/i.test(navigator.userAgent.toLowerCase()) ? `⭐ 请按 ⌘+D 收藏` : `⭐ 请按 Ctrl+D 收藏`); }
        function showToast(msg) { const t = document.getElementById('toast'); t.innerText = msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 3000); }

        function parseMarkdown(text) {
            let html = text;
            html = html.replace(/==(.*?)==/g, '<span class="highlight-gold">$1</span>'); 
            html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/(?:^|<br>)> (.*?)(?=<br>|$)/g, '<br><blockquote class="pull-quote">$1</blockquote>'); 
            html = html.replace(/!\[(.*?)\]\((.*?)\)/g, '<img src="$2" alt="$1" loading="lazy" decoding="async">');
            html = html.replace(/\[(.*?)\]\((.*?)\)/g, '<a href="$2" target="_blank">$1</a>');
            return html;
        }

        const backToTopBtn = document.getElementById('backToTop');
        window.addEventListener('scroll', () => { window.scrollY > 400 ? backToTopBtn.classList.add('show') : backToTopBtn.classList.remove('show'); });
        backToTopBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

        document.addEventListener("DOMContentLoaded", function() {
            const fallbackLoader = setTimeout(dismissGlobalLoader, 8000);

            const storyId = new URLSearchParams(window.location.search).get('id');
            if (!storyId || typeof dbData === 'undefined' || !dbData.stories) { 
                document.getElementById('errorContent').style.display = "block";
                dismissGlobalLoader(); clearTimeout(fallbackLoader); return; 
            }
            
            const story = dbData.stories.find(s => s.id === storyId);
            if (!story) { 
                document.getElementById('errorContent').style.display = "block";
                dismissGlobalLoader(); clearTimeout(fallbackLoader); return; 
            }

            currentArticleData = { title: story.title, cover: getFastCdnUrl(story.cover) };

            document.title = `${story.title} | 戴维的梦想世界`;
            document.getElementById('r_breadcrumb_title').innerText = story.title;
            document.getElementById('r_title').innerHTML = story.title.replace('：', '：<br>');
            document.getElementById('r_date').innerText = ((story.trip_date && story.trip_date.trim()) ? story.trip_date : story.date).replace(/-/g, '.');
            document.getElementById('r_location').innerText = story.location || "未知";

            const mediaBox = document.getElementById('r_media');
            const coverUrl = getFastCdnUrl(story.cover);
            if (story.bilibili_bvid && story.bilibili_bvid.trim()) {
                let vid = story.bilibili_bvid.trim();
                if (!vid.endsWith('.mp4')) { const m = vid.match(/(BV[a-zA-Z0-9]+)/); if (m) vid = m[1]; }
                if (vid.endsWith('.mp4')) {
                    mediaBox.innerHTML = `<video controls poster="${coverUrl}"><source src="${vid}" type="video/mp4"></video>`;
                } else {
                    mediaBox.innerHTML = `<img src="${coverUrl}" class="facade-cover" onclick="loadIframeVideo('${vid}', '${coverUrl}')"><div class="facade-play" onclick="loadIframeVideo('${vid}', '${coverUrl}')"></div>`;
                }
            } else { mediaBox.innerHTML = `<img src="${coverUrl}">`; }

            const contentBox = document.getElementById('r_content');
            story.paragraphs.forEach(para => { contentBox.innerHTML += `<p>${parseMarkdown(getFastCdnUrl(para))}</p>`; });

            if (story.cta_link && story.cta_link.trim()) {
                document.getElementById('ctaContainer').style.display = 'flex';
                document.getElementById('r_cta_text').innerText = story.cta_text || "推荐延伸阅读：";
                document.getElementById('r_cta_link').href = story.cta_link;
            }

            const relatedGrid = document.getElementById('r_related_grid');
            let others = dbData.stories.filter(s => s.id !== storyId);
            if (others.length > 0) {
                document.getElementById('relatedSection').style.display = 'block';
                others.sort(() => 0.5 - Math.random()); 
                others.slice(0, 2).forEach(item => {
                    relatedGrid.innerHTML += `
                        <a href="story-detail.html?id=${item.id}" class="related-card">
                            <img src="${getFastCdnUrl(item.cover)}" class="r-card-img" loading="lazy">
                            <div class="r-card-overlay"></div>
                            <div class="r-card-content"><span class="r-card-tag">STORY</span><h3 class="r-card-title">${item.title}</h3></div>
                        </a>`;
                });
            }

            document.getElementById('mainContent').style.display = 'block';
            setTimeout(initLightbox, 500);
            
            dismissGlobalLoader();
            clearTimeout(fallbackLoader);
        });
    </script>
</body>
</html>
