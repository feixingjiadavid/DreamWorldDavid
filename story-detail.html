<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>故事详情 | DAVID EXPEDITION</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    
    <script>document.write('<script src="data.js?v=' + new Date().getTime() + '"><\/script>');</script>
    
    <style>
        :root {
            --bg-base: #050505; --text-primary: #FFFFFF; --text-dimmed: #888888;
            --gold: #D4AF37; --radius: 8px; --transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg-base); color: var(--text-primary); font-family: 'Noto Sans SC', sans-serif; -webkit-font-smoothing: antialiased; line-height: 1.8; overflow-x: hidden;}

        #init-loader { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--bg-base); z-index: 9999; display: flex; justify-content: center; align-items: center; transition: opacity 0.8s ease, visibility 0.8s ease; }
        .loader-brand { font-family: 'Inter', sans-serif; font-size: 1.2rem; font-weight: 700; letter-spacing: 6px; color: var(--gold); animation: breath 2s infinite ease-in-out; text-transform: uppercase;}
        @keyframes breath { 0% { opacity: 0.3; transform: scale(0.98); } 50% { opacity: 1; transform: scale(1); } 100% { opacity: 0.3; transform: scale(0.98); } }
        body.loaded #init-loader { opacity: 0; visibility: hidden; }

        /* 面包屑导航 (横向滚动优化) */
        .breadcrumb-nav { padding: 30px 6vw; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); font-family: 'Inter', sans-serif; font-size: 0.8rem; letter-spacing: 1px; white-space: nowrap; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none;}
        .breadcrumb-nav::-webkit-scrollbar { display: none; }
        .crumb-link { color: var(--text-dimmed); text-decoration: none; transition: color 0.3s; text-transform: uppercase; flex-shrink: 0;}
        .crumb-link:hover { color: var(--gold); }
        .crumb-separator { color: #444; font-size: 0.8rem; flex-shrink: 0;}
        .crumb-current { color: var(--text-primary); font-family: 'Noto Sans SC', sans-serif; overflow: hidden; text-overflow: ellipsis; max-width: 250px; flex-shrink: 0;}

        .container { max-width: 1200px; margin: 0 auto; padding: 40px 6vw 120px 6vw; }

        .media-container { width: 100%; border-radius: var(--radius); overflow: hidden; margin-bottom: 60px; background: #111; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 30px 60px rgba(0,0,0,0.5); aspect-ratio: 16/9;}
        .media-container iframe, .media-container img, .media-container video { width: 100%; height: 100%; object-fit: cover; display: block; border: none; }

        .story-grid-layout { display: grid; grid-template-columns: 1fr 1.2fr; gap: 60px; align-items: start; }

        .story-sidebar { padding-right: 20px; }
        .story-tag { font-family: 'Inter'; font-size: 0.8rem; color: var(--gold); letter-spacing: 4px; text-transform: uppercase; margin-bottom: 25px; display: block; font-weight: 700;}
        .story-title { font-size: clamp(2.2rem, 4vw, 3.5rem); font-weight: 900; line-height: 1.2; letter-spacing: -1px; margin-bottom: 25px; }
        .story-meta { color: var(--text-dimmed); font-size: 0.9rem; display: flex; align-items: center; gap: 5px; font-weight: 300; flex-wrap: wrap;}

        .story-article { border-left: 1px solid rgba(255,255,255,0.05); padding-left: 60px; }
        .story-content { font-size: 1.05rem; color: #CCCCCC; font-weight: 300; text-align: justify; line-height: 1.8; margin-bottom: 60px;}
        .story-content p { margin-bottom: 30px; }

        .cta-block { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 35px; flex-wrap: wrap; gap: 20px;}
        .cta-text { color: var(--text-dimmed); font-size: 0.95rem; font-weight: 300;}
        .cta-btn { padding: 12px 30px; background: transparent; color: var(--gold); border: 1px solid var(--gold); border-radius: 40px; text-decoration: none; font-size: 0.9rem; font-weight: 500; transition: var(--transition); white-space: nowrap;}
        .cta-btn:hover { background: rgba(212,175,55,0.1); transform: translateX(5px); }

        .action-bar { display: flex; gap: 20px; align-items: center; margin-top: 50px; padding-top: 30px; border-top: 1px dashed rgba(255,255,255,0.1); }
        .action-btn { background: transparent; border: none; color: var(--text-dimmed); font-family: var(--font-zh); font-size: 0.85rem; letter-spacing: 2px; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: var(--transition); outline: none; padding: 0;}
        .action-btn:hover { color: var(--gold); transform: translateY(-2px); }
        .action-btn svg { width: 16px; height: 16px; fill: currentColor; }
        
        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: #111; border: 1px solid var(--gold); color: var(--gold); padding: 12px 25px; border-radius: 40px; font-size: 0.85rem; letter-spacing: 1px; opacity: 0; transition: var(--transition); z-index: 9999; box-shadow: 0 10px 30px rgba(0,0,0,0.8); pointer-events: none; }
        #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        /* 回到顶部按钮 */
        .back-to-top { position: fixed; bottom: 40px; right: 40px; width: 45px; height: 45px; border-radius: 50%; background: rgba(17,17,17,0.8); border: 1px solid rgba(212,175,55,0.3); color: var(--gold); font-size: 1.2rem; cursor: pointer; display: flex; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: var(--transition); z-index: 99; backdrop-filter: blur(5px);}
        .back-to-top.show { opacity: 1; visibility: visible; transform: translateY(0); }
        .back-to-top:hover { background: var(--gold); color: #000; border-color: var(--gold); }

        .site-footer { border-top: 1px solid rgba(255,255,255,0.05); padding: 40px 0; text-align: center; font-family: 'Inter'; font-size: 0.8rem; color: var(--text-dimmed); letter-spacing: 2px; }
        #loadingState { text-align: center; color: var(--gold); letter-spacing: 2px; margin-top: 100px; font-family: 'Inter'; display: none; }

        /* 移动端专属适配 */
        @media (max-width: 900px) {
            .story-grid-layout { grid-template-columns: 1fr; gap: 40px; }
            .story-article { border-left: none; padding-left: 0; }
            .story-sidebar { padding-right: 0; }
        }

        @media (max-width: 768px) {
            .breadcrumb-nav { padding: 20px 5vw; font-size: 0.75rem;}
            .crumb-current { max-width: none; } /* 允许手机上横划看完标题 */
            
            .container { padding: 20px 5vw 80px 5vw; }
            .media-container { border-radius: 0; margin-left: -5vw; width: 100vw; margin-bottom: 30px; border-left: none; border-right: none;}
            .story-tag { font-size: 0.75rem; margin-bottom: 15px; }
            .story-title { font-size: 1.8rem; margin-bottom: 15px; line-height: 1.3;}
            .story-meta { font-size: 0.8rem; flex-wrap: wrap; }
            .story-content { font-size: 0.95rem; text-align: left; } 
            .story-content p { margin-bottom: 20px; }
            .cta-block { flex-direction: column; align-items: flex-start; gap: 15px; padding-top: 25px;}
            .cta-text { font-size: 0.85rem; line-height: 1.6;}
            .cta-btn { width: 100%; text-align: center; }
            .action-bar { margin-top: 30px; padding-top: 20px; justify-content: space-around; width: 100%;}
            
            /* 拇指友好的回到顶部位置 */
            .back-to-top { bottom: 25px; right: 25px; width: 44px; height: 44px; font-size: 1.1rem; box-shadow: 0 4px 15px rgba(0,0,0,0.5);}
        }
    </style>

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-LJQMME1NDE"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-LJQMME1NDE');
    </script>
</head>
<body>

    <div id="init-loader"><div class="loader-brand">DAVID EXPEDITION</div></div>

    <nav class="breadcrumb-nav">
        <a href="index.html" class="crumb-link">Home / 首页</a>
        <span class="crumb-separator">/</span>
        <a href="stories.html" class="crumb-link">Stories / 旅行故事</a>
        <span class="crumb-separator">/</span>
        <span class="crumb-current" id="r_breadcrumb_title">读取中...</span>
    </nav>

    <div id="loadingState">读取数据中...</div>

    <main class="container" id="mainContent" style="display: none;">
        
        <div class="media-container" id="r_media"></div>

        <div class="story-grid-layout">
            <aside class="story-sidebar">
                <span class="story-tag">EXPEDITION LOG</span>
                <h1 class="story-title" id="r_title"></h1>
                <div class="story-meta">
                    记录于 <span id="r_date" style="color: #fff; margin: 0 5px;"></span> // 地点：<span id="r_location" style="color: #fff; margin-left: 5px;">未知</span>
                </div>
            </aside>

            <article class="story-article">
                <div class="story-content" id="r_content"></div>
                
                <div class="cta-block" id="ctaContainer" style="display: none;">
                    <span class="cta-text" id="r_cta_text"></span>
                    <a href="#" class="cta-btn" id="r_cta_link">获取本篇详细攻略 ↗</a>
                </div>

                <div class="action-bar">
                    <button class="action-btn" onclick="sharePage()">
                        <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg>
                        分享故事
                    </button>
                    <button class="action-btn" onclick="bookmarkPage()">
                        <svg viewBox="0 0 24 24"><path d="M17 3H7c-1.1 0-1.99.9-1.99 2L5 21l7-3 7 3V5c0-1.1-.9-2-2-2z"/></svg>
                        收藏本页
                    </button>
                </div>
            </article>
        </div>
    </main>

    <button id="backToTop" class="back-to-top" title="回到顶部">↑</button>

    <footer class="site-footer">
        © 2026 DAVID EXPEDITION.
    </footer>

    <div id="toast">提示信息</div>

    <script>
        function getFastCdnUrl(url) {
            if (!url) return '';
            if (url.startsWith('images/')) return `https://cdn.jsdelivr.net/gh/feixingjiadavid/DreamWorldDavid/${url}`;
            return url;
        }

        function sharePage() {
            if (navigator.share) {
                navigator.share({ title: document.title, text: '来看看这篇旅行故事：', url: window.location.href }).catch(console.error);
            } else {
                navigator.clipboard.writeText(window.location.href);
                showToast("✓ 链接已复制，去粘贴分享吧！");
            }
        }

        function bookmarkPage() {
            const isMac = /macintosh|mac os x/i.test(navigator.userAgent.toLowerCase());
            const key = isMac ? '⌘+D' : 'Ctrl+D';
            showToast(`⭐ 请按 ${key} 将本页加入收藏夹`);
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg; toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 3000);
        }

        // 回到顶部逻辑
        const backToTopBtn = document.getElementById('backToTop');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 400) {
                backToTopBtn.classList.add('show');
            } else {
                backToTopBtn.classList.remove('show');
            }
        });
        backToTopBtn.addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        document.addEventListener("DOMContentLoaded", function() {
            const loaderTimeout = setTimeout(() => { document.body.classList.add('loaded'); }, 2500);
            function removeLoader() { clearTimeout(loaderTimeout); setTimeout(() => { document.body.classList.add('loaded'); }, 300); }

            const urlParams = new URLSearchParams(window.location.search);
            const storyId = urlParams.get('id');

            if (!storyId) {
                removeLoader();
                document.getElementById('loadingState').innerText = "ERROR: 缺少故事编号参数";
                document.getElementById('loadingState').style.display = "block";
                return;
            }

            const data = typeof dbData !== 'undefined' ? dbData : null; 
            if(!data || !data.stories) { removeLoader(); return; }
            
            const story = data.stories.find(s => s.id === storyId);

            if (!story) {
                removeLoader();
                document.getElementById('loadingState').innerText = "ERROR: 在数据库中未找到该故事";
                document.getElementById('loadingState').style.display = "block";
                return;
            }

            // 面包屑渲染
            document.getElementById('r_breadcrumb_title').innerText = story.title;

            document.getElementById('r_title').innerHTML = story.title.replace('：', '：<br>');
            const displayDate = (story.trip_date && story.trip_date.trim() !== '') ? story.trip_date : story.date;
            document.getElementById('r_date').innerText = displayDate.replace(/-/g, '.');
            document.getElementById('r_location').innerText = story.location || "未知";

            const mediaBox = document.getElementById('r_media');
            const finalCoverUrl = getFastCdnUrl(story.cover);

            if (story.bilibili_bvid && story.bilibili_bvid.trim() !== "") {
                const vid = story.bilibili_bvid.trim();
                if (vid.endsWith('.mp4')) {
                    mediaBox.innerHTML = `<video controls poster="${finalCoverUrl}"><source src="${vid}" type="video/mp4"></video>`;
                } else {
                    mediaBox.innerHTML = `<iframe src="//player.bilibili.com/player.html?bvid=${vid}&page=1&high_quality=1&danmaku=0" scrolling="no" border="0" frameborder="no" framespacing="0" allowfullscreen="true"></iframe>`;
                }
            } else {
                mediaBox.innerHTML = `<img src="${finalCoverUrl}" alt="Cover">`;
            }

            const contentBox = document.getElementById('r_content');
            story.paragraphs.forEach(para => { contentBox.innerHTML += `<p>${para}</p>`; });

            const ctaContainer = document.getElementById('ctaContainer');
            if (story.cta_link && story.cta_link.trim() !== "") {
                ctaContainer.style.display = 'flex';
                document.getElementById('r_cta_text').innerText = story.cta_text || "了解更多详情信息";
                document.getElementById('r_cta_link').href = story.cta_link;
            }

            document.getElementById('mainContent').style.display = 'block';
            removeLoader();
        });
    </script>
</body>
</html>
