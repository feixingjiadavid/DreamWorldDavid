<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    <title>硬核攻略专栏 | 戴维的梦想世界</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Noto+Sans+SC:wght@300;500;700&display=swap" rel="stylesheet">
    <script>document.write('<script src="data.js?v=' + new Date().getTime() + '"><\/script>');</script>
    
    <style>
        :root { --bg: #050505; --text: #fff; --gold: #D4AF37; --dim: #888; --radius: 8px; --transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);}
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Noto Sans SC', sans-serif; margin: 0; -webkit-font-smoothing: antialiased; overflow-x: hidden; display: flex; flex-direction: column; min-height: 100vh;}
        
        nav { display: flex; justify-content: space-between; align-items: center; padding: 30px 6vw; font-size: 0.95rem; font-weight: 500; letter-spacing: 1px; border-bottom: 1px solid rgba(255,255,255,0.05); position: sticky; top: 0; background: rgba(5,5,5,0.8); backdrop-filter: blur(20px); z-index: 100;}
        .nav-brand a { color: var(--text); text-decoration: none; font-weight: 700; font-size: 1.2rem; letter-spacing: 2px; transition: color 0.3s ease;}
        .nav-brand a:hover { color: var(--gold); } 
        .nav-links { display: flex; gap: 40px; align-items: center; font-size: 0.95rem; font-weight: 500; letter-spacing: 1px; }
        .nav-links a { color: var(--dim); text-decoration: none; position: relative; padding-bottom: 6px; transition: color 0.3s ease; white-space: nowrap;}
        .nav-links a:hover, .nav-links a.active { color: var(--text); }
        .nav-links a.active::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 2px; background-color: var(--text); }
        
        .mobile-menu-btn { display: none; background: transparent; border: none; color: #fff; font-size: 1.8rem; cursor: pointer; z-index: 101; position: relative; width: 40px; height: 40px; }
        .mobile-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(5,5,5,0.98); backdrop-filter: blur(15px); z-index: 99; display: flex; flex-direction: column; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: all 0.4s; }
        .mobile-overlay.active { opacity: 1; visibility: visible; }
        .mobile-overlay a { color: #fff; text-decoration: none; font-size: 2rem; font-weight: 700; letter-spacing: 4px; margin: 20px 0; opacity: 0; transform: translateY(20px); transition: all 0.4s; }
        .mobile-overlay.active a { opacity: 1; transform: translateY(0); }
        .mobile-overlay a.active { color: var(--gold); }

        .breadcrumb-nav { display: flex; align-items: center; gap: 12px; margin-bottom: 40px; padding: 30px 6vw 0; font-family: 'Inter', sans-serif; font-size: 0.8rem; letter-spacing: 1px; white-space: nowrap;}
        .crumb-link { color: var(--dim); text-decoration: none; transition: color 0.3s;}
        .crumb-link:hover { color: var(--gold); }
        .crumb-separator { color: #444; font-size: 0.8rem;}
        .crumb-current { color: var(--text);}
        
        .container { max-width: 1400px; margin: 0 auto; padding: 20px 6vw 80px 6vw; flex: 1; width: 100%;}
        .page-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 60px; gap: 40px; flex-wrap: wrap;}
        .title-area h1 { font-size: 3.5rem; font-weight: 700; letter-spacing: -1px; margin-bottom: 10px; margin-top: 0;}
        .title-area p { margin: 0; color: var(--dim); font-size: 1.1rem;}

        .search-wrapper { position: relative; width: 100%; max-width: 400px; }
        #guideSearch { width: 100%; background: transparent; border: none; border-bottom: 2px solid rgba(255,255,255,0.1); padding: 12px 0; color: #fff; font-size: 1.1rem; outline: none; transition: border-color 0.3s; font-family: 'Noto Sans SC', sans-serif;}
        #guideSearch:focus { border-color: var(--gold); }
        .search-wrapper::after { content: 'SEARCH'; position: absolute; right: 0; top: 15px; font-size: 0.7rem; color: var(--dim); letter-spacing: 2px; font-family: 'Inter'; }
        
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 40px; }
        .guide-card { background: #111; border-radius: var(--radius); overflow: hidden; text-decoration: none; color: inherit; border: 1px solid rgba(255,255,255,0.03); transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1); display: block;}
        .guide-card:hover { border-color: rgba(212, 175, 55, 0.4); transform: translateY(-8px); box-shadow: 0 20px 40px rgba(0,0,0,0.6);}
        .cover-wrapper { position: relative; width: 100%; aspect-ratio: 16/9; overflow: hidden; background: #222;}
        .cover { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; transition: 1.5s ease; }
        .guide-card:hover .cover { opacity: 1; transform: scale(1.05); }

        .play-icon { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.8); width: 50px; height: 50px; background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.3); border-radius: 50%; display: flex; justify-content: center; align-items: center; z-index: 3; opacity: 0; transition: all 0.4s ease; backdrop-filter: blur(4px); pointer-events: none;}
        .play-icon::after { content: '▶'; color: #fff; font-size: 1rem; margin-left: 4px; }
        .guide-card:hover .play-icon { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        
        .content { padding: 30px; }
        .tag { color: #38bdf8; font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 15px; display: block; font-family: 'Inter'; font-weight: 700;}
        .title { font-size: 1.6rem; font-weight: 700; margin-bottom: 15px; line-height: 1.3; }
        .desc { color: var(--dim); font-size: 0.95rem; line-height: 1.7; font-weight: 300;}

        .no-results { color: var(--dim); font-family: 'Inter'; letter-spacing: 2px; grid-column: 1 / -1; font-size: 0.85rem;}
        .load-more-container { text-align: center; margin-top: 60px; display: none; }
        .btn-load-more { display: inline-block; padding: 14px 40px; background: transparent; border: 1px solid rgba(255,255,255,0.2); color: var(--text); font-family: 'Noto Sans SC', sans-serif; font-size: 0.95rem; font-weight: 500; letter-spacing: 2px; border-radius: 40px; cursor: pointer; transition: 0.3s; outline: none;}
        .btn-load-more:hover { border-color: var(--gold); color: var(--gold); transform: translateY(-3px); }
        
        .site-footer { border-top: 1px solid rgba(255,255,255,0.05); padding: 40px 0; text-align: center; font-family: 'Inter'; font-size: 0.8rem; color: var(--dim); letter-spacing: 2px; margin-top: auto;}

        @media (max-width: 1024px) { .grid { grid-template-columns: 1fr 1fr; gap: 30px;} }
        @media (max-width: 768px) { 
            nav { padding: 20px 5vw; border-bottom: none; background: var(--bg-base); position: relative;}
            .nav-links { display: none; }
            .mobile-menu-btn { display: block; }
            .nav-brand a { font-size: 1.1rem; letter-spacing: 2px; }
            .breadcrumb-nav { padding: 0 5vw 20px; font-size: 0.75rem;}
            .container { padding: 10px 5vw 60px 5vw; }
            .page-header { flex-direction: column; align-items: flex-start; gap: 20px; margin-bottom: 40px; }
            .title-area h1 { font-size: 2.2rem; }
            .search-wrapper { max-width: 100%; }
            .grid { grid-template-columns: 1fr; gap: 25px; } 
            .guide-card { border-radius: 6px; }
            .content { padding: 20px; }
            .title { font-size: 1.35rem; }
            .btn-load-more { width: 100%; padding: 12px 0; }
        }
    </style>
</head>
<body>
    
    <nav>
        <div class="nav-brand"><a href="index.html">戴维的梦想世界</a></div>
        <div class="nav-links">
            <a href="index.html">首页</a>
            <a href="stories.html">旅行故事</a>
            <a href="guides.html" class="active">攻略指南</a>
            <a href="toolkit.html">资料下载</a>
            <a href="radar.html">避坑雷达</a>
            <a href="consult.html">智能路书</a>
        </div>
        <button class="mobile-menu-btn" id="menuToggle">☰</button>
    </nav>

    <div class="mobile-overlay" id="mobileOverlay">
        <a href="index.html">首页</a>
        <a href="stories.html">旅行故事</a>
        <a href="guides.html" class="active">攻略指南</a>
        <a href="toolkit.html">资料下载</a>
        <a href="radar.html">避坑雷达</a>
        <a href="consult.html">智能路书</a>
    </div>

    <div class="breadcrumb-nav">
        <a href="index.html" class="crumb-link">首页</a><span class="crumb-separator">/</span>
        <span class="crumb-current">攻略指南</span>
    </div>

    <main class="container">
        <header class="page-header">
            <div class="title-area">
                <h1>攻略指南</h1>
                <p>硬核干货储备：从签证策略到无人区驾驶指南</p>
            </div>
            <div class="search-wrapper">
                <input type="text" id="guideSearch" placeholder="搜索目的地或关键词...">
            </div>
        </header>

        <div class="grid" id="guidesGrid"></div>

        <div class="load-more-container" id="loadMoreBox">
            <button class="btn-load-more" id="loadMoreBtn">解密更多攻略 ↓</button>
        </div>
    </main>
    
    <footer class="site-footer">© 2026 戴维的梦想世界.</footer>

    <script>
        function getFastCdnUrl(url) { if (!url) return ''; return url.startsWith('images/') ? `https://cdn.jsdelivr.net/gh/feixingjiadavid/DreamWorldDavid/${url}` : url; }

        const menuToggle = document.getElementById('menuToggle');
        const mobileOverlay = document.getElementById('mobileOverlay');
        let isMenuOpen = false;
        menuToggle.addEventListener('click', () => {
            isMenuOpen = !isMenuOpen;
            if(isMenuOpen) { mobileOverlay.classList.add('active'); menuToggle.innerText = '✕'; document.body.style.overflow = 'hidden';
            } else { mobileOverlay.classList.remove('active'); menuToggle.innerText = '☰'; document.body.style.overflow = 'auto'; }
        });

        document.addEventListener("DOMContentLoaded", function() {
            const grid = document.getElementById('guidesGrid');
            const searchInput = document.getElementById('guideSearch');
            const loadMoreBox = document.getElementById('loadMoreBox');
            const loadMoreBtn = document.getElementById('loadMoreBtn');
            
            if (typeof dbData === 'undefined' || !dbData.guides) {
                grid.innerHTML = '<div class="no-results" style="color:var(--gold);">未检测到云端数据节点，请确保后台已发布攻略。</div>';
                return;
            }

            let allGuides = dbData.guides.sort((a, b) => new Date(b.date) - new Date(a.date));
            let currentDisplayList = [...allGuides];
            let currentPage = 1;
            const itemsPerPage = 6; 

            const renderCards = (page, append = false) => {
                if (!append) grid.innerHTML = '';
                if(currentDisplayList.length === 0) {
                    grid.innerHTML = '<div class="no-results">未能找到匹配的硬核攻略。</div>';
                    loadMoreBox.style.display = 'none'; return;
                }

                const startIndex = (page - 1) * itemsPerPage;
                const endIndex = page * itemsPerPage;
                const itemsToRender = currentDisplayList.slice(startIndex, endIndex);

                itemsToRender.forEach(guide => {
                    const hasVideo = guide.video && guide.video.trim() !== '';
                    const playIconHtml = hasVideo ? `<div class="play-icon"></div>` : '';
                    const cardHTML = `
                        <a href="guide-detail.html?id=${guide.id}" class="guide-card">
                            <div class="cover-wrapper">
                                <img src="${getFastCdnUrl(guide.cover)}" class="cover" alt="${guide.title}" loading="lazy">
                                ${playIconHtml}
                            </div>
                            <div class="content">
                                <span class="tag">EXPEDITION GUIDE</span>
                                <div class="title">${guide.title.replace('：', '：<br>')}</div>
                                <p class="desc">${guide.short_desc}</p>
                            </div>
                        </a>`;
                    grid.insertAdjacentHTML('beforeend', cardHTML);
                });

                loadMoreBox.style.display = endIndex >= currentDisplayList.length ? 'none' : 'block';
            };

            renderCards(1);
            loadMoreBtn.addEventListener('click', () => { currentPage++; renderCards(currentPage, true); });
            searchInput.addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                currentDisplayList = allGuides.filter(guide => guide.title.toLowerCase().includes(term) || guide.short_desc.toLowerCase().includes(term));
                currentPage = 1; renderCards(1, false);
            });
        });
    </script>
</body>
</html>
