<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>数字资料中心 | 戴维的梦想世界</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=Noto+Sans+SC:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script>document.write('<script src="data.js?v=' + new Date().getTime() + '"><\/script>');</script>
    <style>
        :root { --bg-base: #050505; --text-primary: #FFFFFF; --gold: #D4AF37; --border: rgba(255,255,255,0.05); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg-base); color: var(--text-primary); font-family: 'Noto Sans SC', sans-serif; -webkit-font-smoothing: antialiased; display: flex; flex-direction: column; min-height: 100vh;}

        nav { display: flex; justify-content: space-between; align-items: center; padding: 30px 6vw; font-size: 0.95rem; font-weight: 500; letter-spacing: 1px; border-bottom: 1px solid var(--border); background: rgba(5,5,5,0.8); backdrop-filter: blur(20px); z-index: 100;}
        .nav-brand a { color: var(--text-primary); text-decoration: none; font-weight: 700; font-size: 1.2rem; letter-spacing: 2px;}
        .nav-brand a:hover { color: var(--gold); } 
        .nav-links { display: flex; gap: 50px; align-items: center; }
        .nav-links a { color: #888; text-decoration: none; position: relative; padding-bottom: 6px; transition: 0.3s; white-space: nowrap;}
        .nav-links a:hover, .nav-links a.active { color: var(--text-primary); }
        .nav-links a.active::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 2px; background-color: var(--text-primary); }
        .mobile-menu-btn { display: none; background: transparent; border: none; color: #fff; font-size: 1.8rem; cursor: pointer; }
        
        .mobile-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(5,5,5,0.98); backdrop-filter: blur(15px); z-index: 99; display: flex; flex-direction: column; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: 0.4s; }
        .mobile-overlay.active { opacity: 1; visibility: visible; }
        .mobile-overlay a { color: #fff; text-decoration: none; font-size: 2rem; font-weight: 700; letter-spacing: 4px; margin: 20px 0; opacity: 0; transform: translateY(20px); transition: 0.4s; }
        .mobile-overlay.active a { opacity: 1; transform: translateY(0); }
        .mobile-overlay a.active { color: var(--gold); }

        .breadcrumb-nav { padding: 30px 6vw; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border); font-family: 'Inter', sans-serif; font-size: 0.8rem; letter-spacing: 1px;}
        .crumb-link { color: #888; text-decoration: none; transition: 0.3s;}
        .crumb-link:hover { color: var(--gold); }
        .crumb-separator { color: #444;}
        .crumb-current { color: var(--text-primary);}

        .container { max-width: 1400px; margin: 0 auto; padding: 60px 6vw; flex: 1; width: 100%; }
        .page-header { margin-bottom: 60px;}
        .title-area h1 { font-size: clamp(2.5rem, 5vw, 4rem); font-weight: 900; letter-spacing: -1px; margin-bottom: 15px; margin-top: 0;}
        .title-area p { color: #888; font-size: 1.1rem; margin: 0; max-width: 700px; line-height: 1.8;}
        .title-tag { font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; color: #38bdf8; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 15px; display: block; font-weight: 700;}

        .toolkit-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 40px;}
        
        .tk-card { background: #111; border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); transition: 0.4s; display: flex; flex-direction: column; text-decoration: none; box-shadow: 0 10px 30px rgba(0,0,0,0.3);}
        .tk-card:hover { transform: translateY(-8px); border-color: rgba(56, 189, 248, 0.4); box-shadow: 0 20px 50px rgba(0,0,0,0.6);}
        
        .tk-cover { width: 100%; height: 200px; position: relative; overflow: hidden;}
        .tk-cover img { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; transition: 1s;}
        .tk-card:hover .tk-cover img { opacity: 1; transform: scale(1.05);}
        .tk-type-badge { position: absolute; top: 20px; left: 20px; background: rgba(56, 189, 248, 0.2); color: #38bdf8; border: 1px solid rgba(56, 189, 248, 0.3); padding: 4px 12px; border-radius: 4px; font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; font-weight: 700; z-index: 2; backdrop-filter: blur(4px);}
        
        .tk-content { padding: 30px; display: flex; flex-direction: column; flex: 1;}
        .tk-title { font-size: 1.4rem; font-weight: 700; color: #fff; margin: 0 0 15px 0;}
        .tk-desc { color: #888; font-size: 0.95rem; line-height: 1.6; margin-bottom: 25px; flex: 1;}
        
        .tk-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px dashed rgba(255,255,255,0.1); padding-top: 20px;}
        .tk-size { font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; color: #555;}
        .tk-btn { background: transparent; color: #38bdf8; border: 1px solid #38bdf8; padding: 8px 20px; border-radius: 40px; font-size: 0.85rem; font-weight: 500; transition: 0.3s; display: flex; align-items: center; gap: 6px;}
        .tk-card:hover .tk-btn { background: rgba(56, 189, 248, 0.1);}
        
        .site-footer { border-top: 1px solid var(--border); padding: 40px 0; text-align: center; font-family: 'Inter'; font-size: 0.8rem; color: #888; letter-spacing: 2px; margin-top: auto;}

        @media (max-width: 768px) {
            nav { padding: 20px 5vw; border-bottom: none;}
            .nav-links { display: none; }
            .mobile-menu-btn { display: block; }
            .nav-brand a { font-size: 1.1rem; }
            .container { padding: 30px 5vw; }
            .toolkit-grid { grid-template-columns: 1fr; gap: 25px;}
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-brand"><a href="index.html">戴维的梦想世界</a></div>
        <div class="nav-links">
            <a href="index.html">首页</a>
            <a href="stories.html">旅行故事</a>
            <a href="guides.html">攻略指南</a>
            <a href="toolkit.html" class="active">资料下载</a>
            <a href="radar.html">避坑雷达</a>
            <a href="hub.html">极境导航</a>
        </div>
        <button class="mobile-menu-btn" id="menuToggle">☰</button>
    </nav>
    <div class="mobile-overlay" id="mobileOverlay">
        <a href="index.html">首页</a>
        <a href="stories.html">旅行故事</a>
        <a href="guides.html">攻略指南</a>
        <a href="toolkit.html" class="active">资料下载</a>
        <a href="radar.html">避坑雷达</a>
        <a href="hub.html">极境导航</a>
    </div>

    <div class="breadcrumb-nav">
        <a href="index.html" class="crumb-link">首页</a><span class="crumb-separator">/</span>
        <span class="crumb-current">数字资料中心</span>
    </div>

    <main class="container">
        <header class="page-header">
            <div class="title-area">
                <span class="title-tag">EXPEDITION TOOLKIT</span>
                <h1>数字资料中心</h1>
                <p>这里没有百度网盘的提取码。只有高通过率签证模板、避坑核对清单、与精确到小时的硬核行程规划源文件。即点即下。</p>
            </div>
        </header>

        <div class="toolkit-grid" id="toolkitGrid"></div>
    </main>

    <footer class="site-footer">© 2026 戴维的梦想世界.</footer>

    <script>
        const menuToggle = document.getElementById('menuToggle');
        const mobileOverlay = document.getElementById('mobileOverlay');
        menuToggle.addEventListener('click', () => {
            mobileOverlay.classList.toggle('active');
            menuToggle.innerText = mobileOverlay.classList.contains('active') ? '✕' : '☰';
        });

        function getFastCdnUrl(url) { if (!url) return ''; return url.startsWith('images/') ? `https://cdn.jsdelivr.net/gh/feixingjiadavid/DreamWorldDavid/${url}` : url; }

        document.addEventListener("DOMContentLoaded", function() {
            const grid = document.getElementById('toolkitGrid');
            if (typeof dbData === 'undefined' || !dbData.toolkits || dbData.toolkits.length === 0) {
                grid.innerHTML = '<div style="color:#555; font-family:Inter; grid-column: 1/-1; text-align:center; padding: 50px 0;">资源库正在构建中...</div>';
                return;
            }

            const toolkits = dbData.toolkits.sort((a, b) => new Date(b.date) - new Date(a.date));

            toolkits.forEach(item => {
                const coverHtml = item.cover ? `<img src="${getFastCdnUrl(item.cover)}" alt="cover">` : `<div style="width:100%;height:100%;background:#222;"></div>`;
                const cardHTML = `
                    <a href="${item.link}" target="_blank" class="tk-card">
                        <div class="tk-cover">
                            <span class="tk-type-badge">${item.type}</span>
                            ${coverHtml}
                        </div>
                        <div class="tk-content">
                            <h2 class="tk-title">${item.title}</h2>
                            <p class="tk-desc">${item.desc}</p>
                            <div class="tk-footer">
                                <span class="tk-size">${item.size}</span>
                                <span class="tk-btn">📥 获取文件</span>
                            </div>
                        </div>
                    </a>
                `;
                grid.insertAdjacentHTML('beforeend', cardHTML);
            });
        });
    </script>
</body>
</html>
