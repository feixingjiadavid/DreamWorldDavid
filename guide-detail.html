<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>攻略详情 | 戴维的梦想世界</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;900&family=JetBrains+Mono:wght@100;300;400&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <script>document.write('<script src="data.js?v=' + new Date().getTime() + '"><\/script>');</script>
    <style>
        :root {
            --bg-base: #050505; --text-primary: #FFFFFF; --text-secondary: #AAAAAA;
            --text-dimmed: #888888; --gold: #D4AF37; --radius: 4px;
            --transition-smooth: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg-base); color: var(--text-primary); font-family: 'Noto Sans SC', sans-serif; -webkit-font-smoothing: antialiased; line-height: 1.6; overflow-x: hidden;}

        nav { padding: 25px 6vw; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .back-btn { color: var(--text-primary); text-decoration: none; font-size: 0.95rem; font-weight: 500; letter-spacing: 1px; transition: color 0.3s; }
        .back-btn:hover { color: var(--gold); }
        .nav-meta { font-family: 'Inter'; font-size: 0.75rem; color: var(--text-dimmed); letter-spacing: 2px; text-transform: uppercase; }

        .container { max-width: 1400px; margin: 0 auto; padding: 40px 6vw 100px 6vw; }

        .hero-section { display: grid; grid-template-columns: 1.1fr 1fr; gap: 6vw; align-items: center; margin-bottom: 50px; }
        .hero-title-block h1 { font-size: clamp(2.2rem, 3.5vw, 4rem); font-weight: 700; line-height: 1.3; letter-spacing: -1px; margin: 0; word-break: keep-all; }
        .hero-tag { color: var(--gold); font-size: 0.8rem; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 15px; display: block; font-weight: 500; }
        .hero-desc-block { display: flex; flex-direction: column; justify-content: center; }
        .hero-desc { color: #A0A0A0; font-size: 1.05rem; line-height: 1.8; font-weight: 300; text-align: justify; margin: 0; }

        .media-box { width: 100%; aspect-ratio: 16 / 9; background: #111; border-radius: var(--radius); overflow: hidden; margin-bottom: 60px; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 30px 60px rgba(0,0,0,0.5); }
        .media-box video, .media-box iframe, .media-box img { width: 100%; height: 100%; display: block; object-fit: cover; border: none; outline: none; }

        .download-section { margin-bottom: 80px; display: none; }
        .download-header { font-family: 'Inter'; font-size: 0.75rem; color: var(--text-dimmed); letter-spacing: 4px; text-transform: uppercase; margin-bottom: 25px; display: flex; align-items: center; gap: 15px;}
        .download-header::before { content: ''; display: block; width: 30px; height: 1px; background-color: var(--gold); opacity: 0.5; }
        .download-list { display: flex; gap: 15px; flex-direction: column; }
        .btn-download { display: inline-flex; align-items: center; padding: 15px 25px; background: #111; border: 1px solid rgba(255,255,255,0.05); color: var(--text-primary); text-decoration: none; border-radius: var(--radius); font-size: 0.95rem; font-weight: 400; transition: var(--transition-smooth); width: max-content; }
        .btn-download::before { content: '↓'; color: var(--gold); margin-right: 15px; font-weight: 700; }
        .btn-download:hover { border-color: rgba(212, 175, 55, 0.4); transform: translateX(5px); }

        .section-label { font-family: 'Inter'; font-size: 0.75rem; color: var(--text-dimmed); letter-spacing: 4px; text-transform: uppercase; margin-bottom: 25px; display: flex; align-items: center; gap: 15px;}
        .section-label::before { content: ''; display: block; width: 30px; height: 1px; background-color: var(--gold); opacity: 0.5; }
        
        .intel-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 100px; }
        .intel-card { background: #0D0D0D; padding: 30px; border-radius: var(--radius); border: 1px solid rgba(255,255,255,0.03); transition: var(--transition-smooth); }
        .intel-card:hover { border-color: rgba(212, 175, 55, 0.2); transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.5);}
        .intel-card h4 { font-family: 'Inter'; font-size: 0.8rem; color: var(--gold); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 15px; }
        .intel-card p { font-size: 0.95rem; color: #CCCCCC; line-height: 1.8; font-weight: 300; margin: 0; }

        .itinerary-list { display: flex; flex-direction: column; gap: 40px; }
        .day-row { display: grid; grid-template-columns: 80px 1fr; gap: 40px; padding-bottom: 50px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .day-label { font-family: 'Inter'; font-size: 2.8rem; font-weight: 900; color: var(--gold); line-height: 1; margin-top: -5px;}
        .day-content h3 { font-size: 1.6rem; font-weight: 700; margin-bottom: 15px; letter-spacing: 1px; color: #fff;}
        .day-content p { color: #A0A0A0; font-size: 1.05rem; margin-bottom: 25px; font-weight: 300; text-align: justify; line-height: 1.8;}
        
        .day-tags { display: flex; gap: 12px; flex-wrap: wrap; }
        .tag-pill { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); padding: 8px 16px; border-radius: 4px; font-size: 0.85rem; color: #DDD; font-weight: 400; display: flex; align-items: center; }

        .site-footer { background-color: #0A0A0A; border-top: 1px solid rgba(255,255,255,0.03); padding: 40px 5vw; margin-top: 30px; text-align: center; font-family: 'Inter'; font-size: 0.75rem; color: var(--text-dimmed); text-transform: uppercase; letter-spacing: 2px; }

        #loadingState { text-align: center; color: var(--gold); letter-spacing: 2px; margin-top: 100px; font-family: 'Inter'; }

        /* =========================================
           移动端终极奢华适配 (完全不影响 PC)
           ========================================= */
        @media (max-width: 1024px) {
            .hero-section { grid-template-columns: 1fr; gap: 30px; }
            .intel-grid { grid-template-columns: 1fr 1fr; }
            .day-row { grid-template-columns: 1fr; gap: 15px; }
            .day-label { font-size: 2rem; margin-top: 0; }
        }
        
        @media (max-width: 768px) {
            /* 1. 缩减外边距，最大化屏幕利用率 */
            .container { padding: 20px 20px 60px 20px; }
            nav { padding: 20px; flex-direction: column; align-items: flex-start; gap: 10px; }
            
            /* 2. 英雄区重构：缩小字号，取消强制两端对齐 */
            .hero-section { grid-template-columns: 1fr; gap: 20px; margin-bottom: 30px; }
            .hero-title-block h1 { font-size: 1.8rem; line-height: 1.3; letter-spacing: 0; }
            .hero-desc { text-align: left; font-size: 0.95rem; line-height: 1.7; color: #999; }
            
            .media-box { margin-bottom: 40px; border-radius: 6px; }

            /* 3. 核心修复：六宫格强制单列，消除面条感，提升卡片质感 */
            .intel-grid { grid-template-columns: 1fr; gap: 15px; margin-bottom: 50px; } 
            .intel-card { padding: 20px; border-radius: 6px; }
            .intel-card h4 { font-size: 0.75rem; margin-bottom: 10px; }
            .intel-card p { font-size: 0.95rem; line-height: 1.7; text-align: left; }
            
            /* 4. 行程列表重构：上下堆叠式设计，大编号在顶部 */
            .day-row { grid-template-columns: 1fr; gap: 10px; padding-bottom: 30px;}
            .day-label { font-size: 2rem; margin-top: 0; margin-bottom: 5px;}
            .day-content h3 { font-size: 1.25rem; margin-bottom: 10px;}
            .day-content p { text-align: left; font-size: 0.95rem; line-height: 1.7; margin-bottom: 15px; color: #999;}
            .tag-pill { font-size: 0.75rem; padding: 6px 12px; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="guides.html" class="back-btn">← 返回攻略列表</a>
        <div class="nav-meta">ITINERARY LOG // 2026</div>
    </nav>

    <div id="loadingState">读取数据中...</div>

    <main class="container" id="mainContent" style="display: none;">
        
        <header class="hero-section">
            <div class="hero-title-block">
                <span class="hero-tag">Exploration Guide</span>
                <h1 id="renderTitle">加载中...</h1>
            </div>
            <div class="hero-desc-block">
                <p class="hero-desc" id="renderDesc">加载中...</p>
            </div>
        </header>

        <section class="media-box" id="renderMedia"></section>

        <section class="download-section" id="downloadSection">
            <div class="download-header">ATTACHMENTS // 附加资料</div>
            <div class="download-list" id="renderDownloads"></div>
        </section>

        <div class="section-label">CRITICAL INTEL</div>
        <section class="intel-grid" id="renderIntel"></section>

        <div class="section-label">ACTION PLAN</div>
        <section class="itinerary-list" id="renderItinerary"></section>

    </main>

    <footer class="site-footer">
        © 2026 DAVID EXPEDITION. ALL RIGHTS RESERVED.
    </footer>

    <script>
        function getFastCdnUrl(url) {
            if (!url) return '';
            if (url.startsWith('images/')) return `https://cdn.jsdelivr.net/gh/feixingjiadavid/DreamWorldDavid/${url}`;
            return url;
        }

        document.addEventListener("DOMContentLoaded", function() {
            const urlParams = new URLSearchParams(window.location.search);
            const guideId = urlParams.get('id');

            if (!guideId) {
                document.getElementById('loadingState').innerText = "ERROR: 请在网址末尾添加 ?id=xxx 指定攻略编号";
                return;
            }

            const data = (typeof dbData !== 'undefined') ? dbData : null; 
            if (!data || !data.guides) return;

            const guide = data.guides.find(g => g.id === guideId);

            if (!guide) {
                document.getElementById('loadingState').innerText = "ERROR: 找不到对应的攻略数据";
                return;
            }

            document.getElementById('renderTitle').innerHTML = guide.title.replace('：', '：<br>');
            document.getElementById('renderDesc').innerText = guide.intro_desc;

            const mediaBox = document.getElementById('renderMedia');
            if (guide.video && guide.video.trim() !== '') {
                const vid = guide.video.trim();
                if (vid.startsWith('BV') || vid.startsWith('bv')) {
                    mediaBox.innerHTML = `<iframe src="//player.bilibili.com/player.html?bvid=${vid}&page=1&high_quality=1&danmaku=0" scrolling="no" border="0" frameborder="no" framespacing="0" allowfullscreen="true"></iframe>`;
                } else if (vid.endsWith('.mp4')) {
                    mediaBox.innerHTML = `<video controls poster="${getFastCdnUrl(guide.cover)}"><source src="${vid}" type="video/mp4"></video>`;
                } else {
                    mediaBox.innerHTML = `<img src="${getFastCdnUrl(guide.cover)}" alt="Cover">`;
                }
            } else {
                mediaBox.innerHTML = `<img src="${getFastCdnUrl(guide.cover)}" alt="Cover">`;
            }

            if (guide.downloads && guide.downloads.length > 0) {
                const dlContainer = document.getElementById('downloadSection');
                const dlList = document.getElementById('renderDownloads');
                dlContainer.style.display = 'block'; 
                guide.downloads.forEach(dl => {
                    dlList.innerHTML += `<a href="${dl.url}" target="_blank" download class="btn-download">${dl.name}</a>`;
                });
            }

            const intelContainer = document.getElementById('renderIntel');
            if (guide.intel) {
                guide.intel.forEach(item => {
                    intelContainer.innerHTML += `
                        <div class="intel-card">
                            <h4>${item.title}</h4>
                            <p>${item.content}</p>
                        </div>
                    `;
                });
            }

            const itContainer = document.getElementById('renderItinerary');
            if (guide.itinerary) {
                guide.itinerary.forEach(day => {
                    const tagsHtml = day.tags ? day.tags.map(tag => `<span class="tag-pill">${tag}</span>`).join('') : '';
                    itContainer.innerHTML += `
                        <div class="day-row">
                            <div class="day-label">${day.day}</div>
                            <div class="day-content">
                                <h3>${day.title}</h3>
                                <p>${day.desc}</p>
                                <div class="day-tags">${tagsHtml}</div>
                            </div>
                        </div>
                    `;
                });
            }

            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
        });
    </script>
</body>
</html>
