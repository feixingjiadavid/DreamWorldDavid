        .guide-meta { color: var(--text-dimmed); font-size: 0.95rem; display: flex; gap: 20px; font-weight: 300;}

        @keyframes imgFadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .toc-sidebar { position: sticky; top: 40px; padding-right: 20px; }
        .toc-title { font-family: 'Inter'; font-size: 0.75rem; color: var(--gold); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px; font-weight: 700; border-bottom: 1px solid rgba(212,175,55,0.2); padding-bottom: 10px;}

        .toc-link:hover { color: #fff; background: rgba(255,255,255,0.02); }

        .guide-content img:hover { filter: brightness(1.1); }

        .action-btn { background: transparent; border: none; color: var(--text-dimmed); font-family: var(--font-zh); font-size: 0.85rem; letter-spacing: 2px; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: var(--transition); outline: none; padding: 0;}
        .action-btn:hover { color: var(--gold); transform: translateY(-2px); }
        .action-btn svg { width: 16px; height: 16px; fill: currentColor; }
        
        .related-section { max-width: 1400px; margin: 0 auto; padding: 40px 6vw 80px 6vw; border-top: 1px solid var(--border); }

            <div class="share-card-content">
                <div class="share-card-tag">EXPEDITION GUIDE</div>
                <h3 class="share-card-title" id="shareTitle">加载中...</h3>
                <div class="share-card-footer">
                    <div class="share-brand">DAVID EXPEDITION<span>探索世界隐秘的B面</span></div>
                    <div class="qr-wrapper" id="qrcode-container"></div>
                </div>
            </div>
            <img src="" id="generatedShareImage">
        </div>
        <div class="share-actions">
            <p class="share-tip" id="shareTipText">提取视觉资产中...</p>
            <button class="share-copy-btn" onclick="copyShareText()">📄 复制精美图文链接</button>
        </div>
    </div>

    <button id="backToTop" class="back-to-top" title="回到顶部">↑</button>
    <footer class="site-footer">© 2026 DAVID EXPEDITION.</footer>
    <div class="lightbox-overlay" id="globalLightbox"><img src="" class="lightbox-img" id="lightboxImg"></div>
    <div id="toast">提示信息</div>

    <script>
        let currentArticleData = null;

        function getFastCdnUrl(url) { if (!url) return ''; if (url.startsWith('images/')) return `https://cdn.jsdelivr.net/gh/feixingjiadavid/DreamWorldDavid/${url}`; return url; }
        
        async function openShareModal() {
            if(!currentArticleData) return;
            const modal = document.getElementById('shareModal');
            const tip = document.getElementById('shareTipText');
            const target = document.getElementById('shareCardHTML');
            const generatedImg = document.getElementById('generatedShareImage');
            const coverImg = document.getElementById('shareCoverImg');
            
            generatedImg.style.display = 'none'; generatedImg.src = '';
            tip.innerText = "⏳ 正在拉取高清影像...";
            document.getElementById('shareTitle').innerText = currentArticleData.title;
            
            const qrContainer = document.getElementById('qrcode-container');
            qrContainer.innerHTML = ''; 
            new QRCode(qrContainer, { text: window.location.href, width: 52, height: 52, colorDark : "#000", colorLight : "#fff", correctLevel : QRCode.CorrectLevel.M });
            
            modal.classList.add('active');

            try {
                await new Promise((resolve) => {
                    coverImg.onload = resolve; coverImg.onerror = resolve; 
                    const cleanUrl = currentArticleData.cover;
                    coverImg.src = cleanUrl + (cleanUrl.includes('?') ? '&' : '?') + 'cors_bypass=' + Date.now();
                });

                tip.innerText = "⏳ 正在生成专属分享海报...";
                await new Promise(r => setTimeout(r, 300));

                const canvas = await html2canvas(target, { useCORS: true, allowTaint: false, scale: 2, backgroundColor: "#0A0A0A", logging: false });
                const imgData = canvas.toDataURL("image/jpeg", 0.9);
                tip.innerText = "👍 生成成功！请长按上方海报保存";
                
                generatedImg.src = imgData; generatedImg.style.display = 'block'; generatedImg.style.opacity = '0.01'; 
            } catch (e) { console.error("Guide poster generation failed:", e); tip.innerText = "❌ 海报生成失败，请尝试直接手机截屏"; }
        }
        
        function closeShareModal() { document.getElementById('shareModal').classList.remove('active'); }
        function copyShareText() {
            const text = `▬ DAVID EXPEDITION ▬\n\n《${document.title.split(' | ')[0]}》\n硬核干货攻略，点击阅读全文：\n${window.location.href}`;
            navigator.clipboard.writeText(text); showToast('✓ 专属邀请文案已复制！'); closeShareModal();
        }

        function bookmarkPage() { showToast(/macintosh|mac os x/i.test(navigator.userAgent.toLowerCase()) ? `⭐ 请按 ⌘+D 收藏` : `⭐ 请按 Ctrl+D 收藏`); }
        function showToast(msg) { const t = document.getElementById('toast'); t.innerText = msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 3000); }
        
        // 核心突破：前台增强版 MD 解析器
        function parseMarkdown(text) {
            let html = text;
            html = html.replace(/==(.*?)==/g, '<span style="color: var(--gold); font-weight: 700;">$1</span>'); // 解析高亮金字
            html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/(?:^|<br>)> (.*?)(?=<br>|$)/g, '<br><blockquote class="pull-quote">$1</blockquote>'); // 解析杂志级引用
            html = html.replace(/!\[(.*?)\]\((.*?)\)/g, '<img src="$2" alt="$1" loading="lazy">');
            html = html.replace(/\[(.*?)\]\((.*?)\)/g, '<a href="$2" target="_blank">$1</a>');
            return html;
        }

        const backToTopBtn = document.getElementById('backToTop');
        window.addEventListener('scroll', () => { window.scrollY > 400 ? backToTopBtn.classList.add('show') : backToTopBtn.classList.remove('show'); });
        backToTopBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

        function bindLightbox() {
            const lb = document.getElementById('globalLightbox'); const lbImg = document.getElementById('lightboxImg');
            document.querySelectorAll('.guide-content img, .gallery-item').forEach(img => {
                img.addEventListener('click', function() { lbImg.src = this.src; lb.classList.add('active'); });
            });
            lb.addEventListener('click', function() { this.classList.remove('active'); setTimeout(() => lbImg.src = '', 400); });
        }

        document.addEventListener("DOMContentLoaded", function() {
            const loaderTimeout = setTimeout(() => document.body.classList.add('loaded'), 2500);
            function removeLoader() { clearTimeout(loaderTimeout); setTimeout(() => document.body.classList.add('loaded'), 300); }

            const guideId = new URLSearchParams(window.location.search).get('id');
            if (!guideId || typeof dbData === 'undefined' || !dbData.guides) { removeLoader(); return; }
            
            const guide = dbData.guides.find(g => g.id === guideId);
            if (!guide) { document.getElementById('loadingState').innerText="未找到攻略"; return; }

            currentArticleData = { title: guide.title, cover: getFastCdnUrl(guide.cover) };

            document.title = `${guide.title} | DAVID EXPEDITION`;
            document.getElementById('r_breadcrumb_title').innerText = guide.title;
            document.getElementById('r_title').innerHTML = guide.title.replace('：', '：<br>');
            document.getElementById('r_date').innerText = ((guide.trip_date && guide.trip_date.trim()) ? guide.trip_date : guide.date).replace(/-/g, '.');
            document.getElementById('r_short').innerText = guide.short_desc;
            document.getElementById('r_intro').innerHTML = parseMarkdown(getFastCdnUrl(guide.intro_desc.replace(/\n/g, '<br><br>')));

            const mediaBox = document.getElementById('r_media');
            const coverUrl = getFastCdnUrl(guide.cover);
            if (guide.video && guide.video.trim()) {
                let vid = guide.video.trim();
                if (!vid.endsWith('.mp4')) { const m = vid.match(/(BV[a-zA-Z0-9]+)/); if (m) vid = m[1]; }
                mediaBox.innerHTML = vid.endsWith('.mp4') ? `<video controls poster="${coverUrl}"><source src="${vid}" type="video/mp4"></video>` : `<iframe src="//player.bilibili.com/player.html?bvid=${vid}&page=1&high_quality=1&danmaku=0" scrolling="no" border="0" frameborder="no" framespacing="0" allowfullscreen="true"></iframe>`;
            } else { mediaBox.innerHTML = `<img src="${coverUrl}">`; }

            if(guide.gallery && guide.gallery.length > 0) {
                document.getElementById('r_gallery_section').style.display = 'block';
                const galleryBox = document.getElementById('r_gallery');
                guide.gallery.forEach(img => {
                    galleryBox.innerHTML += `<img src="${getFastCdnUrl(img)}" class="gallery-item" loading="lazy">`;
                });
            }

            const tocList = document.getElementById('r_toc_list');
            tocList.innerHTML = ''; 

            const intelWrapper = document.getElementById('r_intel_wrapper');
            if(guide.intel && guide.intel.length > 0) {
                tocList.innerHTML += `<li><a href="#section-intel" class="toc-link">Critical Intel / 干货情报</a></li>`;
                let intelHtml = `<div class="section-title" id="section-intel">CRITICAL INTEL // 干货情报区</div><div class="intel-grid">`;
                guide.intel.forEach(item => { intelHtml += `<div class="intel-card"><div class="intel-title">${item.title}</div><p class="intel-desc">${parseMarkdown(getFastCdnUrl(item.content))}</p></div>`; });
                intelHtml += `</div>`;
                intelWrapper.innerHTML = intelHtml;
            }

            const itinWrapper = document.getElementById('r_itinerary_wrapper');
            if(guide.itinerary && guide.itinerary.length > 0) {
                let itinHtml = `<div class="section-title" id="section-itinerary">ACTION PLAN // 逐日拔草路线</div>`;
                guide.itinerary.forEach((item, index) => {
                    const blockId = `day-${index + 1}`;
                    const tagsHtml = (item.tags && item.tags.length > 0) ? `<div class="day-tags">${item.tags.map(t => `<span class="tag-pill">${t}</span>`).join('')}</div>` : '';
                    itinHtml += `
                        <div class="day-block" id="${blockId}">
                            <span class="day-num">${item.day}</span><h3 class="day-title">${item.title}</h3>
                            <div class="day-desc">${parseMarkdown(getFastCdnUrl(item.desc.replace(/\n/g, '<br>')))}</div>
                            ${tagsHtml}
                        </div>`;
                    tocList.innerHTML += `<li><a href="#${blockId}" class="toc-link">${item.day.split('//')[0].trim()}: ${item.title}</a></li>`;
                });
                itinWrapper.innerHTML = itinHtml;
            }

            if (tocList.innerHTML === '') {
                document.getElementById('r_toc_sidebar').style.display = 'none';
                document.querySelector('.guide-layout').style.gridTemplateColumns = '1fr';
            }

            if (guide.cta_link && guide.cta_link.trim()) {
                document.getElementById('ctaContainer').style.display = 'flex';
                document.getElementById('r_cta_text').innerText = guide.cta_text || "推荐延伸阅读：";
                document.getElementById('r_cta_link').href = guide.cta_link;
            }

            const tocLinks = document.querySelectorAll('.toc-link');
            const sections = document.querySelectorAll('.section-title, .day-block');
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        tocLinks.forEach(link => link.classList.remove('active'));
                        const activeLink = document.querySelector(`.toc-link[href="#${entry.target.getAttribute('id')}"]`);
                        if (activeLink) activeLink.classList.add('active');
                    }
                });
            }, { root: null, rootMargin: '-10% 0px -70% 0px', threshold: 0 });
            sections.forEach(sec => observer.observe(sec));

            tocLinks.forEach(link => { link.addEventListener('click', function(e) { e.preventDefault(); window.scrollTo({ top: document.getElementById(this.getAttribute('href').substring(1)).offsetTop - 60, behavior: 'smooth' }); }); });

            const relatedGrid = document.getElementById('r_related_grid');
            let others = dbData.guides.filter(g => g.id !== guideId);
            if (others.length > 0) {
                document.getElementById('relatedSection').style.display = 'block';
                others.sort(() => 0.5 - Math.random()); 
                others.slice(0, 3).forEach(item => {
                    relatedGrid.innerHTML += `
                        <a href="guide-detail.html?id=${item.id}" class="related-card">
                            <img src="${getFastCdnUrl(item.cover)}" class="r-card-img" loading="lazy">
                            <div class="r-card-overlay"></div>
                            <div class="r-card-content"><span class="r-card-tag">GUIDE</span><h3 class="r-card-title">${item.title}</h3></div>
                        </a>`;
                });
            }

            document.getElementById('mainContent').style.display = 'block';
            bindLightbox(); removeLoader();
        });
    </script>
</body>
</html>
