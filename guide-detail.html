<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>攻略详情 | DAVID EXPEDITION</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    
    <script>document.write('<script src="data.js?v=' + new Date().getTime() + '"><\/script>');</script>
    
    <style>
        :root {
            --bg-base: #050505; --bg-panel: #111; --text-primary: #FFFFFF; --text-dimmed: #888888;
            --gold: #D4AF37; --radius: 8px; --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg-base); color: var(--text-primary); font-family: 'Noto Sans SC', sans-serif; -webkit-font-smoothing: antialiased; line-height: 1.8; overflow-x: hidden;}

        /* 首屏加载幕布 */
        #init-loader { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--bg-base); z-index: 9999; display: flex; justify-content: center; align-items: center; transition: opacity 0.8s ease, visibility 0.8s ease; }
        .loader-brand { font-family: 'Inter', sans-serif; font-size: 1.2rem; font-weight: 700; letter-spacing: 6px; color: var(--gold); animation: breath 2s infinite ease-in-out; text-transform: uppercase;}
        @keyframes breath { 0% { opacity: 0.3; transform: scale(0.98); } 50% { opacity: 1; transform: scale(1); } 100% { opacity: 0.3; transform: scale(0.98); } }
        body.loaded #init-loader { opacity: 0; visibility: hidden; }

        nav { padding: 30px 6vw; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .back-btn { color: var(--text-primary); text-decoration: none; font-size: 0.95rem; font-weight: 500; transition: color 0.3s; letter-spacing: 1px;}
        .back-btn:hover { color: var(--gold); }

        .container { max-width: 1400px; margin: 0 auto; padding: 40px 6vw 120px 6vw; }

        /* 头部信息区 */
        .guide-header { margin-bottom: 50px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 40px;}
        .guide-tag { font-family: 'Inter'; font-size: 0.8rem; color: #38bdf8; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 20px; display: block; font-weight: 700;}
        .guide-title { font-size: clamp(2.5rem, 4vw, 4rem); font-weight: 900; line-height: 1.1; letter-spacing: -1px; margin-bottom: 20px; }
        .guide-meta { color: var(--text-dimmed); font-size: 0.95rem; display: flex; gap: 20px; font-weight: 300;}

        /* 媒体区 */
        .media-container { width: 100%; border-radius: var(--radius); overflow: hidden; margin-bottom: 60px; background: var(--bg-panel); aspect-ratio: 21/9;}
        .media-container iframe, .media-container img, .media-container video { width: 100%; height: 100%; object-fit: cover; display: block; border: none; }

        /* 核心网格布局：侧边目录 + 主内容 */
        .guide-layout { display: grid; grid-template-columns: 240px 1fr; gap: 60px; align-items: start; }

        /* 悬浮目录 (TOC) */
        .toc-sidebar { position: sticky; top: 40px; padding-right: 20px; }
        .toc-title { font-family: 'Inter'; font-size: 0.75rem; color: var(--gold); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px; font-weight: 700; border-bottom: 1px solid rgba(212,175,55,0.2); padding-bottom: 10px;}
        .toc-list { list-style: none; padding: 0; margin: 0; border-left: 1px solid rgba(255,255,255,0.05);}
        .toc-item { margin-bottom: 5px; }
        .toc-link { color: var(--text-dimmed); text-decoration: none; font-size: 0.9rem; transition: var(--transition); display: block; padding: 8px 0 8px 15px; border-left: 2px solid transparent; margin-left: -1px; }
        .toc-link:hover { color: #fff; background: rgba(255,255,255,0.02); }
        .toc-link.active { color: var(--gold); border-left-color: var(--gold); font-weight: 500; background: rgba(212,175,55,0.05);}

        /* 主内容区 */
        .guide-content { font-size: 1.05rem; color: #CCC; font-weight: 300; line-height: 1.8; }
        .intro-text { font-size: 1.15rem; margin-bottom: 60px; color: #fff; line-height: 1.9;}

        /* 干货六宫格 */
        .section-title { font-family: 'Inter'; font-size: 0.85rem; color: var(--gold); letter-spacing: 4px; text-transform: uppercase; margin: 60px 0 30px 0; font-weight: 700; display: flex; align-items: center; gap: 15px;}
        .section-title::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.05); }
        
        .intel-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 60px;}
        .intel-card { background: var(--bg-panel); border: 1px solid rgba(255,255,255,0.05); padding: 25px; border-radius: var(--radius); }
        .intel-title { font-size: 1rem; font-weight: 700; color: var(--text-primary); margin-bottom: 10px; }
        .intel-desc { font-size: 0.9rem; color: var(--text-dimmed); margin: 0; }

        /* 逐日行程 */
        .day-block { border-left: 1px dashed rgba(255,255,255,0.1); padding-left: 40px; margin-bottom: 50px; position: relative; scroll-margin-top: 40px;}
        .day-block::before { content: ''; position: absolute; left: -5px; top: 0; width: 9px; height: 9px; background: var(--bg-base); border: 2px solid var(--gold); border-radius: 50%; }
        .day-num { font-family: 'Inter'; font-size: 0.8rem; color: var(--gold); font-weight: 700; letter-spacing: 2px; display: block; margin-bottom: 10px; }
        .day-title { font-size: 1.6rem; font-weight: 700; color: #fff; margin-bottom: 15px; }
        .day-desc { margin-bottom: 20px; }
        .day-tags { display: flex; gap: 10px; flex-wrap: wrap; }
        .tag-pill { background: rgba(255,255,255,0.05); color: #aaa; font-size: 0.8rem; padding: 4px 12px; border-radius: 20px; font-family: 'Inter'; }

        /* 极简分享与收藏模块 CSS */
        .action-bar { display: flex; gap: 20px; align-items: center; margin-top: 80px; padding-top: 30px; border-top: 1px dashed rgba(255,255,255,0.1); }
        .action-btn { background: transparent; border: none; color: var(--text-dimmed); font-family: var(--font-zh); font-size: 0.85rem; letter-spacing: 2px; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: var(--transition); outline: none; padding: 0;}
        .action-btn:hover { color: var(--gold); transform: translateY(-2px); }
        .action-btn svg { width: 16px; height: 16px; fill: currentColor; }
        
        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: #111; border: 1px solid var(--gold); color: var(--gold); padding: 12px 25px; border-radius: 40px; font-size: 0.85rem; letter-spacing: 1px; opacity: 0; transition: var(--transition); z-index: 9999; box-shadow: 0 10px 30px rgba(0,0,0,0.8); pointer-events: none; }
        #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        .site-footer { border-top: 1px solid rgba(255,255,255,0.05); padding: 40px 0; text-align: center; font-family: 'Inter'; font-size: 0.8rem; color: var(--text-dimmed); letter-spacing: 2px; }
        #loadingState { text-align: center; color: var(--gold); letter-spacing: 2px; margin-top: 100px; font-family: 'Inter'; display: none;}

        /* 移动端适配 */
        @media (max-width: 1024px) {
            .intel-grid { grid-template-columns: 1fr; }
        }
        @media (max-width: 900px) {
            .guide-layout { grid-template-columns: 1fr; gap: 40px; }
            .toc-sidebar { display: none; /* 移动端隐藏侧边目录，保持纯粹阅读 */ }
        }
        @media (max-width: 768px) {
            nav { padding: 20px 5vw; }
            .container { padding: 20px 5vw 80px 5vw; }
            .guide-title { font-size: 1.8rem; }
            .guide-meta { font-size: 0.85rem; flex-direction: column; gap: 5px; }
            .media-container { border-radius: 0; margin-left: -5vw; width: 100vw; aspect-ratio: 16/9; margin-bottom: 40px;}
            .day-block { padding-left: 20px; }
            .day-title { font-size: 1.3rem; }
            .intro-text { font-size: 1rem; }
            .action-bar { margin-top: 40px; padding-top: 20px; justify-content: space-around; width: 100%;}
        }
    </style>

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-LJQMME1NDE"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-LJQMME1NDE');
    </script>
</head>
<body>

    <div id="init-loader"><div class="loader-brand">DAVID EXPEDITION</div></div>

    <nav>
        <a href="guides.html" class="back-btn">← 返回攻略指南</a>
    </nav>

    <div id="loadingState">调取硬核数据中...</div>

    <main class="container" id="mainContent" style="display: none;">
        
        <header class="guide-header">
            <span class="guide-tag">EXPEDITION GUIDE</span>
            <h1 class="guide-title" id="r_title"></h1>
            <div class="guide-meta">
                <span>首次部署：<span id="r_date" style="color: #fff;"></span></span>
                <span>核心简报：<span id="r_short" style="color: #fff;"></span></span>
            </div>
        </header>

        <div class="media-container" id="r_media"></div>

        <div class="guide-layout">
            
            <aside class="toc-sidebar">
                <div class="toc-title">INDEX / 攻略目录</div>
                <ul class="toc-list" id="r_toc_list">
                    <li><a href="#section-intel" class="toc-link">Critical Intel / 干货情报</a></li>
                    </ul>
            </aside>

            <div class="guide-content">
                <div class="intro-text" id="r_intro"></div>

                <div class="section-title" id="section-intel">CRITICAL INTEL // 干货情报区</div>
                <div class="intel-grid" id="r_intel"></div>

                <div class="section-title" id="section-itinerary">ACTION PLAN // 逐日拔草路线</div>
                <div id="r_itinerary"></div>

                <div class="action-bar">
                    <button class="action-btn" onclick="sharePage()">
                        <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg>
                        分享攻略
                    </button>
                    <button class="action-btn" onclick="bookmarkPage()">
                        <svg viewBox="0 0 24 24"><path d="M17 3H7c-1.1 0-1.99.9-1.99 2L5 21l7-3 7 3V5c0-1.1-.9-2-2-2z"/></svg>
                        收藏本页
                    </button>
                </div>
            </div>

        </div>

    </main>

    <footer class="site-footer">
        © 2026 DAVID EXPEDITION.
    </footer>

    <div id="toast">提示信息</div>

    <script>
        function getFastCdnUrl(url) {
            if (!url) return '';
            if (url.startsWith('images/')) return `https://cdn.jsdelivr.net/gh/feixingjiadavid/DreamWorldDavid/${url}`;
            return url;
        }

        function sharePage() {
            if (navigator.share) {
                navigator.share({ title: document.title, text: '这篇硬核攻略值得一看：', url: window.location.href }).catch(console.error);
            } else {
                navigator.clipboard.writeText(window.location.href);
                showToast("✓ 链接已复制，去粘贴分享吧！");
            }
        }

        function bookmarkPage() {
            const isMac = /macintosh|mac os x/i.test(navigator.userAgent.toLowerCase());
            const key = isMac ? '⌘+D' : 'Ctrl+D';
            showToast(`⭐ 请按 ${key} 将本页加入收藏夹`);
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg; toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 3000);
        }

        document.addEventListener("DOMContentLoaded", function() {
            const loaderTimeout = setTimeout(() => { document.body.classList.add('loaded'); }, 2500);
            function removeLoader() { clearTimeout(loaderTimeout); setTimeout(() => { document.body.classList.add('loaded'); }, 300); }

            const urlParams = new URLSearchParams(window.location.search);
            const guideId = urlParams.get('id');

            if (!guideId) {
                removeLoader();
                document.getElementById('loadingState').innerText = "ERROR: 缺少攻略编号参数";
                document.getElementById('loadingState').style.display = "block";
                return;
            }

            const data = typeof dbData !== 'undefined' ? dbData : null; 
            if(!data || !data.guides) { removeLoader(); return; }
            
            const guide = data.guides.find(g => g.id === guideId);

            if (!guide) {
                removeLoader();
                document.getElementById('loadingState').innerText = "ERROR: 在数据库中未找到该攻略";
                document.getElementById('loadingState').style.display = "block";
                return;
            }

            // 1. 基础信息
            document.getElementById('r_title').innerHTML = guide.title.replace('：', '：<br>');
            const displayDate = (guide.trip_date && guide.trip_date.trim() !== '') ? guide.trip_date : guide.date;
            document.getElementById('r_date').innerText = displayDate.replace(/-/g, '.');
            document.getElementById('r_short').innerText = guide.short_desc;
            document.getElementById('r_intro').innerHTML = guide.intro_desc.replace(/\n/g, '<br><br>');

            // 2. 媒体处理
            const mediaBox = document.getElementById('r_media');
            const finalCoverUrl = getFastCdnUrl(guide.cover);
            if (guide.video && guide.video.trim() !== "") {
                const vid = guide.video.trim();
                if (vid.endsWith('.mp4')) {
                    mediaBox.innerHTML = `<video controls poster="${finalCoverUrl}"><source src="${vid}" type="video/mp4"></video>`;
                } else {
                    mediaBox.innerHTML = `<iframe src="//player.bilibili.com/player.html?bvid=${vid}&page=1&high_quality=1&danmaku=0" scrolling="no" border="0" frameborder="no" framespacing="0" allowfullscreen="true"></iframe>`;
                }
            } else {
                mediaBox.innerHTML = `<img src="${finalCoverUrl}" alt="Cover">`;
            }

            // 3. 干货区
            const intelBox = document.getElementById('r_intel');
            if(guide.intel && guide.intel.length > 0) {
                guide.intel.forEach(item => {
                    intelBox.innerHTML += `<div class="intel-card"><div class="intel-title">${item.title}</div><p class="intel-desc">${item.content}</p></div>`;
                });
            }

            // 4. 日程区与动态目录(TOC)生成
            const itinBox = document.getElementById('r_itinerary');
            const tocList = document.getElementById('r_toc_list');

            if(guide.itinerary && guide.itinerary.length > 0) {
                guide.itinerary.forEach((item, index) => {
                    const blockId = `day-${index + 1}`;
                    
                    // 生成正文结构
                    let tagsHtml = '';
                    if (item.tags && item.tags.length > 0) {
                        tagsHtml = `<div class="day-tags">${item.tags.map(t => `<span class="tag-pill">${t}</span>`).join('')}</div>`;
                    }
                    itinBox.innerHTML += `
                        <div class="day-block" id="${blockId}">
                            <span class="day-num">${item.day}</span>
                            <h3 class="day-title">${item.title}</h3>
                            <div class="day-desc">${item.desc.replace(/\n/g, '<br>')}</div>
                            ${tagsHtml}
                        </div>
                    `;

                    // 同步生成右侧目录菜单
                    tocList.innerHTML += `<li><a href="#${blockId}" class="toc-link">${item.day.split('//')[0].trim()}: ${item.title}</a></li>`;
                });
            }

            // 5. 目录滚动高亮监听器 (Intersection Observer)
            const tocLinks = document.querySelectorAll('.toc-link');
            const sections = document.querySelectorAll('.section-title, .day-block');
            
            const observerOptions = { root: null, rootMargin: '-10% 0px -70% 0px', threshold: 0 };
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        tocLinks.forEach(link => link.classList.remove('active'));
                        const id = entry.target.getAttribute('id');
                        const activeLink = document.querySelector(`.toc-link[href="#${id}"]`);
                        if (activeLink) activeLink.classList.add('active');
                    }
                });
            }, observerOptions);

            sections.forEach(sec => observer.observe(sec));

            // 平滑滚动监听
            tocLinks.forEach(link => {
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    const targetId = this.getAttribute('href').substring(1);
                    const targetEl = document.getElementById(targetId);
                    if (targetEl) {
                        window.scrollTo({
                            top: targetEl.offsetTop - 60,
                            behavior: 'smooth'
                        });
                    }
                });
            });

            document.getElementById('mainContent').style.display = 'block';
            removeLoader();
        });
    </script>
</body>
</html>
